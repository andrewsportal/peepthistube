<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #4ade80; }
    body {
      margin: 0; background: var(--bg); color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px; max-width: 1000px; margin-left: auto; margin-right: auto;
    }
    h1 { text-align: center; margin: 0 0 20px; font-weight: 600; font-size: 1.6rem; }
    .player-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 12px; flex-wrap: wrap;
    }
    .current-title { font-size: 1.1rem; font-weight: 500; flex: 1; min-width: 200px; }
    .lock-btn {
      background: #222; color: #eee; border: none; padding: 10px 16px;
      border-radius: 9999px; font-size: 0.95rem; display: flex; align-items: center;
      gap: 6px; cursor: pointer; white-space: nowrap; min-height: 44px;
    }
    .lock-btn.locked { background: #166534; color: #4ade80; }
    .player-container {
      background: #111; border-radius: 16px; padding: 16px;
      margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .playlist-section h2 { margin: 0 0 12px; font-size: 1.1rem; font-weight: 500; }
    .video-row {
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
    }
    .video-card {
      min-width: 160px; background: var(--card); border-radius: 12px;
      padding: 14px 16px; cursor: pointer; scroll-snap-align: start;
      border: 2px solid transparent; transition: all 0.2s ease;
      display: flex; flex-direction: column; gap: 6px;
    }
    .video-card:active { transform: scale(0.98); }
    .video-card.active { border-color: var(--accent); background: #222; }
    .video-number { font-size: 0.85rem; color: #888; font-weight: 500; }
    .video-title { font-size: 1rem; line-height: 1.3; font-weight: 500; }
    @media (max-width: 480px) {
      .video-card { min-width: 140px; padding: 12px 14px; }
      .current-title { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <h1>Video Hub</h1>

  <div class="player-container">
    <div class="player-header">
      <div class="current-title" id="currentTitle">Select a video to begin</div>
      <button id="lockBtn" class="lock-btn" onclick="toggleOrientationLock()">
        <span id="lockIcon">🔓</span>
        <span id="lockText">Lock Rotate</span>
      </button>
    </div>
    <video id="player" playsinline></video>
  </div>

  <div class="playlist-section">
    <h2>Videos</h2>
    <div class="video-row" id="videoRow"></div>
    <p style="text-align:center; color:#666; font-size:0.85rem; margin-top:8px;">
      Swipe to browse • Tap any card to play
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    // =====================================================
    // TITLES COME FROM titles.txt (one title per line)
    // Create titles.txt in the same folder as index.html
    // =====================================================

    let videos = [];
    let player;
    let currentVideoId = null;
    let isLocked = false;

    async function loadTitlesAndVideos() {
      let titles = [];

      try {
        const response = await fetch('titles.txt');
        if (response.ok) {
          const text = await response.text();
          titles = text
            .split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0);
        }
      } catch (e) {
        console.log('Could not load titles.txt, using fallback names');
      }

      // Build the videos array
      const count = titles.length > 0 ? titles.length : 8; // fallback to 8 if no titles.txt

      videos = [];
      for (let i = 1; i <= count; i++) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `videos/video${i}.mp4`
        });
      }
    }

    function initPlayer() {
      const videoEl = document.getElementById('player');
      player = new Plyr(videoEl, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
        settings: ['speed'],
        speed: { selected: 1, options: [0.75, 1, 1.25, 1.5, 2] }
      });

      player.on('ended', () => {
        const idx = videos.findIndex(v => v.id === currentVideoId);
        const next = (idx + 1) % videos.length;
        loadVideo(videos[next].id);
      });
    }

    function renderPlaylist() {
      const row = document.getElementById('videoRow');
      row.innerHTML = '';

      videos.forEach(video => {
        const card = document.createElement('div');
        card.className = `video-card ${video.id === currentVideoId ? 'active' : ''}`;
        card.innerHTML = `
          <div class="video-number">#${video.id}</div>
          <div class="video-title">${video.title}</div>
        `;
        card.onclick = () => loadVideo(video.id);
        row.appendChild(card);
      });
    }

    function loadVideo(videoId) {
      const video = videos.find(v => v.id === videoId);
      if (!video) return;

      const videoEl = document.getElementById('player');
      const titleEl = document.getElementById('currentTitle');

      videoEl.src = video.src;
      titleEl.textContent = video.title;
      currentVideoId = videoId;

      renderPlaylist();

      const activeCard = document.querySelector('.video-card.active');
      if (activeCard) {
        activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }

      videoEl.play().catch(() => {});
    }

    async function toggleOrientationLock() {
      const btn = document.getElementById('lockBtn');
      const icon = document.getElementById('lockIcon');
      const text = document.getElementById('lockText');

      if (!screen.orientation || !screen.orientation.lock) {
        alert("Screen rotation lock is not supported on this device.");
        return;
      }

      try {
        if (!isLocked) {
          await screen.orientation.lock('landscape');
          isLocked = true;
          btn.classList.add('locked');
          icon.textContent = '🔒';
          text.textContent = 'Unlock Rotate';
        } else {
          await screen.orientation.unlock();
          isLocked = false;
          btn.classList.remove('locked');
          icon.textContent = '🔓';
          text.textContent = 'Lock Rotate';
        }
      } catch (err) {
        console.log(err);
        alert("Couldn't lock orientation. Try fullscreen first.");
      }
    }

    async function init() {
      await loadTitlesAndVideos();   // ← loads your titles.txt
      initPlayer();
      renderPlaylist();

      // Optional: auto-load first video
      // if (videos.length > 0) loadVideo(videos[0].id);
    }

    window.onload = init;
  </script>
</body>
</html>
