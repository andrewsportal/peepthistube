<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Macintosh TV Player</title>
    <style>
        :root {
            /* Classic Apple Beige/Platinum */
            --casing-color: #E6E6DF; 
            --casing-shadow: #b3b3aa;
            --casing-highlight: #ffffff;
            --screen-bezel: #1a1a1a;
            --button-base: #d9d9d2;
            --button-shadow: #a6a69f;
            --accent-color: #555;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Main Physical Casing */
        .mac-tv-casing {
            background: var(--casing-color);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 
                inset 2px 2px 5px var(--casing-highlight),
                inset -4px -4px 10px var(--casing-shadow),
                10px 15px 30px rgba(0,0,0,0.5);
            width: 640px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
        }

        /* Vents - classic Apple Snow White design language */
        .vents {
            position: absolute;
            top: 40px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .vent-line {
            width: 10px;
            height: 2px;
            background: #a0a09a;
            box-shadow: inset 0px 1px 1px rgba(0,0,0,0.3);
        }

        /* Screen Bezel and CRT Container */
        .screen-bezel {
            background: var(--screen-bezel);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 
                inset 5px 5px 15px rgba(0,0,0,0.8),
                inset -2px -2px 5px rgba(255,255,255,0.2),
                0px 2px 2px rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
        }

        /* The Video Element */
        video {
            width: 100%;
            border-radius: 16px;
            display: block;
            background: #000;
            /* Simulating the slight bulge of a CRT */
            transform: scale(1.02);
        }

        /* CRT Scanline & Glow Overlay */
        .crt-overlay {
            position: absolute;
            top: 20px; right: 20px; bottom: 20px; left: 20px;
            border-radius: 16px;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.15) 50%
            );
            background-size: 100% 4px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        .crt-overlay::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.4) 100%);
            border-radius: 16px;
        }

        /* Control Panel */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--casing-color);
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: inset 0px 0px 10px rgba(0,0,0,0.05);
            border: 1px solid #d0d0c8;
        }

        .apple-logo {
            width: 24px;
            height: 24px;
            /* Placeholder for a classic rainbow or monochrome logo feel */
            background: repeating-linear-gradient(
                to bottom,
                #55B847 0%, #55B847 16.6%,
                #EAA922 16.6%, #EAA922 33.2%,
                #E17025 33.2%, #E17025 49.8%,
                #E02636 49.8%, #E02636 66.4%,
                #972C8C 66.4%, #972C8C 83%,
                #0084C9 83%, #0084C9 100%
            );
            -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>') no-repeat center;
            mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>') no-repeat center;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        /* Tactile Mechanical Buttons */
        button {
            width: 44px;
            height: 36px;
            background: var(--button-base);
            border: 1px solid #c2c2b9;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            box-shadow: 
                0px 3px 0px var(--button-shadow),
                0px 4px 5px rgba(0,0,0,0.2),
                inset 1px 1px 2px rgba(255,255,255,0.8);
            transition: all 0.1s ease;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 
                0px 0px 0px var(--button-shadow),
                0px 1px 2px rgba(0,0,0,0.2),
                inset 1px 1px 3px rgba(0,0,0,0.1);
        }

        button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Screen active state for pseudo-power on effect */
        .video-container {
            position: relative;
        }

        /* Title tag plate */
        .nameplate {
            text-align: center;
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            color: #777;
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            margin-top: -10px;
        }
    </style>
</head>
<body>

    <div class="mac-tv-casing">
        <div class="vents">
            <div class="vent-line"></div>
            <div class="vent-line"></div>
            <div class="vent-line"></div>
            <div class="vent-line"></div>
            <div class="vent-line"></div>
            <div class="vent-line"></div>
        </div>

        <div class="screen-bezel">
            <div class="video-container">
                <div class="crt-overlay"></div>
                <video id="retro-player" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"></video>
            </div>
        </div>

        <div class="nameplate">Macintosh TV</div>

        <div class="control-panel">
            <div class="apple-logo"></div>
            <div class="controls">
                <button id="btn-prev" title="Previous Video">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="btn-rw" title="Rewind 10s">
                    <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                </button>
                <button id="btn-play" title="Play/Pause">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="btn-ff" title="Fast Forward 10s">
                    <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                </button>
                <button id="btn-next" title="Next Video">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <button id="btn-fullscreen" title="Toggle Fullscreen" style="margin-left: 20px;">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Playlist logic
        const playlist = [
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4"
        ];
        
        let currentVideoIndex = 0;
        const video = document.getElementById('retro-player');

        // DOM Elements
        const btnPlay = document.getElementById('btn-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnRw = document.getElementById('btn-rw');
        const btnFf = document.getElementById('btn-ff');
        const btnFullscreen = document.getElementById('btn-fullscreen');

        // Play / Pause Logic
        function togglePlay() {
            if (video.paused) {
                video.play();
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            } else {
                video.pause();
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            }
        }
        btnPlay.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay); // Click video to play/pause

        // Sync button UI if video pauses/plays via other means (like exiting fullscreen)
        video.addEventListener('play', () => {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
        });
        video.addEventListener('pause', () => {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
        });

        // Fast Forward & Rewind (10 seconds)
        btnFf.addEventListener('click', () => {
            video.currentTime += 10;
        });
        btnRw.addEventListener('click', () => {
            video.currentTime -= 10;
        });

        // Playlist Navigation
        function loadVideo(index) {
            // Check boundaries
            if (index < 0) index = playlist.length - 1;
            if (index >= playlist.length) index = 0;
            
            currentVideoIndex = index;
            video.src = playlist[currentVideoIndex];
            
            // Auto-play when changing tracks
            video.play();
        }

        btnPrev.addEventListener('click', () => loadVideo(currentVideoIndex - 1));
        btnNext.addEventListener('click', () => loadVideo(currentVideoIndex + 1));
        
        // Auto-advance to next video when current ends
        video.addEventListener('ended', () => loadVideo(currentVideoIndex + 1));

        // Fullscreen Logic
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) { /* Safari */
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) { /* IE11 */
                    video.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
