<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Retro TV Video Player</title>
  <style>
    :root {
      --casing: #d9d9d3;
      --casing-dark: #a9a9a0;
      --casing-light: #f8f8f4;
      --bezel: #101214;
      --ink: #2f3133;
      --muted: #6f7479;
      --glass: rgba(255, 255, 255, 0.08);
      --accent: #4b5f8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 30% 20%, #2f3d50 0%, rgba(47, 61, 80, 0) 60%),
        radial-gradient(900px 500px at 80% 80%, #283447 0%, rgba(40, 52, 71, 0) 65%),
        #1a2230;
      color: #f5f7fa;
      padding: 24px;
    }

    .tv-shell {
      position: relative;
      width: min(900px, 96vw);
      border-radius: 38px;
      padding: clamp(18px, 2.2vw, 28px);
      background: linear-gradient(145deg, var(--casing-light), var(--casing));
      box-shadow:
        inset 2px 2px 2px rgba(255, 255, 255, 0.85),
        inset -4px -5px 12px rgba(130, 130, 122, 0.7),
        0 24px 45px rgba(0, 0, 0, 0.42);
      border: 1px solid #c4c4bb;
      user-select: none;
    }

    .tv-shell::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 20px;
      bottom: 20px;
      width: 10px;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(70, 70, 66, 0.62) 0,
          rgba(70, 70, 66, 0.62) 2px,
          rgba(230, 230, 223, 0.1) 2px,
          rgba(230, 230, 223, 0.1) 6px
        );
      border-radius: 5px;
      opacity: 0.7;
    }

    .screen-bezel {
      background: radial-gradient(circle at 40% 30%, #24282e 0%, #0b0d10 75%);
      border-radius: 28px;
      padding: clamp(14px, 2vw, 22px);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.07),
        inset 0 0 25px rgba(0, 0, 0, 0.92),
        0 3px 2px rgba(255, 255, 255, 0.35);
      position: relative;
    }

    .screen-wrap {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
      transform: scale(1.012);
      cursor: pointer;
    }

    .crt-overlay,
    .glass-glare {
      pointer-events: none;
      position: absolute;
      inset: 0;
    }

    .crt-overlay {
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.17) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.02));
      background-size: 100% 4px, 3px 100%;
      mix-blend-mode: soft-light;
      opacity: 0.85;
    }

    .glass-glare {
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0) 35%),
        radial-gradient(circle at 50% 120%, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0) 40%);
    }

    .hud {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(13, 16, 20, 0.2), rgba(13, 16, 20, 0.72));
      backdrop-filter: blur(2px);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      line-height: 1.3;
      color: #e7ecf3;
    }

    .video-title {
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 65%;
    }

    .status {
      color: #a7b1bd;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      color: #c4ccd5;
      font-size: 14px;
      line-height: 1.6;
      background: radial-gradient(circle at center, rgba(20, 30, 45, 0.3), rgba(0, 0, 0, 0.8));
    }

    .nameplate {
      margin: 18px auto 14px;
      width: fit-content;
      color: #646970;
      background: linear-gradient(180deg, #f4f4ef, #d6d6cf);
      border: 1px solid #c0c0b8;
      border-radius: 8px;
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.9), inset -1px -1px 0 rgba(157, 157, 147, 0.6);
      padding: 6px 14px;
      font: 700 12px/1.2 "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    .control-panel {
      border-radius: 14px;
      background: linear-gradient(180deg, #e2e2db, #d1d1c9);
      border: 1px solid #bdbdb4;
      box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.75), inset -1px -2px 2px rgba(142, 142, 132, 0.45);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .panel-top {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
      color: var(--ink);
    }

    .transport {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .time-readout {
      margin-left: auto;
      font: 600 12px/1.2 "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: #3b4046;
      white-space: nowrap;
    }

    button {
      border: 1px solid #b7b7ae;
      border-radius: 9px;
      background: linear-gradient(180deg, #f5f5f1, #d4d4cc);
      color: #43474d;
      height: 38px;
      min-width: 44px;
      padding: 0 11px;
      font-weight: 700;
      cursor: pointer;
      box-shadow:
        0 3px 0 #a4a49b,
        0 4px 8px rgba(0, 0, 0, 0.2),
        inset 1px 1px 1px rgba(255, 255, 255, 0.88);
      transition: transform 100ms ease, box-shadow 100ms ease, filter 120ms ease;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    button:active {
      transform: translateY(3px);
      box-shadow:
        0 0 0 #a4a49b,
        0 1px 3px rgba(0, 0, 0, 0.24),
        inset 1px 1px 2px rgba(0, 0, 0, 0.12);
    }

    button:disabled {
      opacity: 0.55;
      filter: grayscale(0.45);
      cursor: not-allowed;
    }

    button svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .is-primary {
      min-width: 56px;
      color: #344562;
      border-color: #aab5cc;
      background: linear-gradient(180deg, #f4f7ff, #d4ddf1);
    }

    .seek-wrap {
      display: grid;
      gap: 7px;
    }

    .seek-label {
      color: #5f656b;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #90a2ca var(--seek-progress, 0%), #bfc4cc var(--seek-progress, 0%));
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #9ea3ac;
      background: linear-gradient(180deg, #fdfefe, #dbdde1);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #9ea3ac;
      background: linear-gradient(180deg, #fdfefe, #dbdde1);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      background:
        repeating-linear-gradient(
          to bottom,
          #62be53 0%,
          #62be53 16.6%,
          #edae2a 16.6%,
          #edae2a 33.2%,
          #e97f2f 33.2%,
          #e97f2f 49.8%,
          #df3444 49.8%,
          #df3444 66.4%,
          #8f4ab4 66.4%,
          #8f4ab4 83%,
          #2b9ae2 83%,
          #2b9ae2 100%
        );
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>') no-repeat center / contain;
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>') no-repeat center / contain;
    }

    .hint {
      color: #5b6067;
      font-size: 11px;
      font-weight: 600;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      border: 0;
      padding: 0;
      white-space: nowrap;
      clip-path: inset(50%);
      clip: rect(0 0 0 0);
      overflow: hidden;
    }

    @media (max-width: 760px) {
      .panel-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .time-readout {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="tv-shell" id="tvShell">
    <section class="screen-bezel">
      <div class="screen-wrap">
        <video id="retroPlayer" playsinline preload="metadata"></video>
        <div class="crt-overlay"></div>
        <div class="glass-glare"></div>
        <div class="empty-state" id="emptyState">
          Loading videos from your repository...
        </div>
        <div class="hud">
          <div class="video-title" id="videoTitle">No video loaded</div>
          <div class="status" id="statusLabel">00:00 / 00:00</div>
        </div>
      </div>
    </section>

    <div class="nameplate">Apple Retro Vision</div>

    <section class="control-panel">
      <div class="panel-top">
        <div class="logo" aria-hidden="true"></div>
        <div class="transport">
          <button id="btnPrev" title="Previous video" aria-label="Previous video">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h2v12H6zM9.5 12l8.5 6V6z"/></svg>
          </button>
          <button id="btnRewind" title="Rewind 10 seconds" aria-label="Rewind 10 seconds">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 18V6l-8.5 6L11 18zm1.5-6l8.5 6V6l-8.5 6z"/></svg>
          </button>
          <button id="btnPlay" class="is-primary" title="Play / Pause" aria-label="Play or pause">
            <svg id="iconPlay" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            <svg id="iconPause" viewBox="0 0 24 24" aria-hidden="true" hidden><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
          </button>
          <button id="btnFastForward" title="Fast forward 10 seconds" aria-label="Fast forward 10 seconds">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
          </button>
          <button id="btnNext" title="Next video" aria-label="Next video">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 18l8.5-6L6 6zm9 0h2V6h-2z"/></svg>
          </button>
          <button id="btnFullscreen" title="Toggle fullscreen" aria-label="Toggle fullscreen">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h6v2H7v4H5V5zm12 0h2v6h-2V7h-4V5h4zM7 13v4h4v2H5v-6h2zm10 0h2v6h-6v-2h4v-4z"/></svg>
          </button>
        </div>
        <div class="time-readout" id="timeReadout">00:00 / 00:00</div>
      </div>

      <div class="seek-wrap">
        <label class="seek-label" for="seekBar">
          <span>Playback scrub</span>
          <span class="hint">J/L +/-10s, Arrow +/-5s, N/P next/prev, F fullscreen</span>
        </label>
        <input id="seekBar" type="range" value="0" min="0" max="1000" step="1" aria-label="Seek bar">
      </div>
    </section>
  </main>

  <script>
    const CONFIG = {
      // Optional overrides when auto-detection is not possible:
      // owner: "your-github-username",
      // repo: "your-repo-name",
      // branch: "main",
      // videosDir: "", // Example: "videos" to only load from /videos
      branch: "main",
      titlesFile: "titles.txt"
    };

    const VIDEO_FILE_REGEX = /\.(mp4|webm|mov|m4v|ogv|ogg)$/i;
    const RETRY_DELAY_MS = 160;

    const elements = {
      tvShell: document.getElementById("tvShell"),
      player: document.getElementById("retroPlayer"),
      emptyState: document.getElementById("emptyState"),
      videoTitle: document.getElementById("videoTitle"),
      statusLabel: document.getElementById("statusLabel"),
      timeReadout: document.getElementById("timeReadout"),
      seekBar: document.getElementById("seekBar"),
      btnPlay: document.getElementById("btnPlay"),
      btnPrev: document.getElementById("btnPrev"),
      btnNext: document.getElementById("btnNext"),
      btnRewind: document.getElementById("btnRewind"),
      btnFastForward: document.getElementById("btnFastForward"),
      btnFullscreen: document.getElementById("btnFullscreen"),
      iconPlay: document.getElementById("iconPlay"),
      iconPause: document.getElementById("iconPause")
    };

    const state = {
      playlist: [],
      currentIndex: -1,
      titleMap: new Map(),
      context: null,
      isScrubbing: false
    };

    function inferGitHubContext() {
      if (CONFIG.owner && CONFIG.repo) {
        return {
          owner: CONFIG.owner,
          repo: CONFIG.repo,
          branch: CONFIG.branch || "main",
          pagePathWithinRepo: ""
        };
      }

      const host = window.location.hostname;
      const pathParts = window.location.pathname.split("/").filter(Boolean);

      if (!host.endsWith(".github.io")) {
        return null;
      }

      const owner = host.split(".")[0];
      let repo;
      let pagePathWithinRepo;

      if (pathParts.length === 0) {
        repo = owner + ".github.io";
        pagePathWithinRepo = "";
      } else {
        repo = pathParts[0];
        pagePathWithinRepo = pathParts.slice(1, -1).join("/");
      }

      return {
        owner,
        repo,
        branch: CONFIG.branch || "main",
        pagePathWithinRepo
      };
    }

    function normalizePath(path) {
      return path.replace(/^\.?\//, "").replace(/\\/g, "/");
    }

    function basename(path) {
      const normalized = normalizePath(path);
      return normalized.split("/").pop() || normalized;
    }

    function prettyTitleFromFilename(filename) {
      const plain = filename.replace(/\.[^.]+$/, "");
      return plain.replace(/[_-]+/g, " ").replace(/\s+/g, " ").trim();
    }

    function parseTitlesFile(text) {
      const map = new Map();
      const lines = text.split(/\r?\n/);

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line || line.startsWith("#")) {
          continue;
        }

        const splitBy = ["|", "="];
        let key = "";
        let value = "";

        for (const separator of splitBy) {
          const index = line.indexOf(separator);
          if (index !== -1) {
            key = line.slice(0, index).trim();
            value = line.slice(index + 1).trim();
            break;
          }
        }

        if (!key || !value) {
          key = line;
          value = prettyTitleFromFilename(basename(line));
        }

        const normalizedKey = normalizePath(key).toLowerCase();
        map.set(normalizedKey, value);
        map.set(basename(normalizedKey), value);
      }

      return map;
    }

    function encodePathForRawUrl(path) {
      return path
        .split("/")
        .map(segment => encodeURIComponent(segment))
        .join("/");
    }

    function toRawGitHubUrl(context, repoPath) {
      const encodedPath = encodePathForRawUrl(repoPath);
      return "https://raw.githubusercontent.com/" +
        context.owner + "/" +
        context.repo + "/" +
        encodeURIComponent(context.branch) + "/" +
        encodedPath;
    }

    async function fetchTextIfExists(url) {
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          return null;
        }
        return await response.text();
      } catch {
        return null;
      }
    }

    async function loadTitles(context) {
      const localText = await fetchTextIfExists(CONFIG.titlesFile + "?v=" + Date.now());
      if (localText) {
        return parseTitlesFile(localText);
      }

      if (!context) {
        return new Map();
      }

      const prefix = context.pagePathWithinRepo ? context.pagePathWithinRepo + "/" : "";
      const remoteTitles = await fetchTextIfExists(toRawGitHubUrl(context, prefix + CONFIG.titlesFile));
      if (remoteTitles) {
        return parseTitlesFile(remoteTitles);
      }

      return new Map();
    }

    async function fetchRepoTreeVideos(context) {
      const apiUrl = "https://api.github.com/repos/" +
        encodeURIComponent(context.owner) + "/" +
        encodeURIComponent(context.repo) +
        "/git/trees/" +
        encodeURIComponent(context.branch) +
        "?recursive=1";

      const response = await fetch(apiUrl, { headers: { "Accept": "application/vnd.github+json" } });
      if (!response.ok) {
        throw new Error("GitHub API returned " + response.status);
      }

      const payload = await response.json();
      const tree = Array.isArray(payload.tree) ? payload.tree : [];
      let files = tree
        .filter(item => item.type === "blob" && VIDEO_FILE_REGEX.test(item.path))
        .map(item => item.path);

      if (CONFIG.videosDir && typeof CONFIG.videosDir === "string") {
        const dir = normalizePath(CONFIG.videosDir).replace(/\/+$/, "") + "/";
        files = files.filter(path => normalizePath(path).startsWith(dir));
      }

      files.sort((a, b) => a.localeCompare(b));

      return files.map(path => ({
        path,
        url: toRawGitHubUrl(context, path)
      }));
    }

    async function discoverPlaylist(context) {
      if (context) {
        try {
          return await fetchRepoTreeVideos(context);
        } catch (error) {
          console.warn("Could not auto-discover videos from GitHub API:", error);
        }
      }

      // Fallback: use paths listed in titles.txt (if any).
      const fallback = [];
      for (const key of state.titleMap.keys()) {
        if (VIDEO_FILE_REGEX.test(key)) {
          fallback.push({ path: key, url: key });
        }
      }
      return fallback;
    }

    function resolveTitle(path) {
      const normalized = normalizePath(path).toLowerCase();
      const fileOnly = basename(normalized);
      return state.titleMap.get(normalized) ||
        state.titleMap.get(fileOnly) ||
        prettyTitleFromFilename(basename(path));
    }

    function setControlsDisabled(disabled) {
      const targets = [
        elements.btnPlay,
        elements.btnPrev,
        elements.btnNext,
        elements.btnRewind,
        elements.btnFastForward,
        elements.btnFullscreen,
        elements.seekBar
      ];
      for (const element of targets) {
        element.disabled = disabled;
      }
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) {
        return "00:00";
      }
      const totalSeconds = Math.floor(seconds);
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
    }

    function updatePlayButtonIcons() {
      const paused = elements.player.paused;
      elements.iconPlay.hidden = !paused;
      elements.iconPause.hidden = paused;
    }

    function updateSeekUI() {
      const video = elements.player;
      const duration = Number.isFinite(video.duration) ? video.duration : 0;
      const current = Number.isFinite(video.currentTime) ? video.currentTime : 0;
      const ratio = duration > 0 ? Math.min(current / duration, 1) : 0;

      if (!state.isScrubbing) {
        elements.seekBar.value = String(Math.round(ratio * 1000));
      }

      const progressPercent = (ratio * 100).toFixed(2) + "%";
      elements.seekBar.style.setProperty("--seek-progress", progressPercent);

      const readout = formatTime(current) + " / " + formatTime(duration);
      elements.timeReadout.textContent = readout;
      elements.statusLabel.textContent = readout;
    }

    function showEmptyState(message) {
      elements.emptyState.hidden = false;
      elements.emptyState.textContent = message;
      elements.videoTitle.textContent = "No video loaded";
      elements.statusLabel.textContent = "00:00 / 00:00";
      elements.timeReadout.textContent = "00:00 / 00:00";
      setControlsDisabled(true);
    }

    function hideEmptyState() {
      elements.emptyState.hidden = true;
      setControlsDisabled(false);
    }

    async function tryPlay() {
      updatePlayButtonIcons();
      try {
        await elements.player.play();
      } catch {
        // Browser blocked autoplay until user gesture.
      }
      updatePlayButtonIcons();
    }

    async function loadTrack(index, shouldAutoplay = true) {
      if (state.playlist.length === 0) {
        showEmptyState("No compatible video files found.");
        return;
      }

      if (index < 0) {
        index = state.playlist.length - 1;
      }
      if (index >= state.playlist.length) {
        index = 0;
      }

      state.currentIndex = index;
      const track = state.playlist[index];
      elements.player.src = track.url;
      elements.player.load();
      elements.videoTitle.textContent = resolveTitle(track.path);
      updateSeekUI();
      hideEmptyState();

      if (shouldAutoplay) {
        await tryPlay();
      } else {
        updatePlayButtonIcons();
      }
    }

    async function nextTrack() {
      await loadTrack(state.currentIndex + 1, true);
    }

    async function previousTrack() {
      await loadTrack(state.currentIndex - 1, true);
    }

    function seekBy(deltaSeconds) {
      const video = elements.player;
      if (!Number.isFinite(video.duration)) {
        return;
      }
      const nextTime = Math.max(0, Math.min(video.currentTime + deltaSeconds, video.duration));
      video.currentTime = nextTime;
      updateSeekUI();
    }

    async function togglePlayPause() {
      if (elements.player.paused) {
        await tryPlay();
      } else {
        elements.player.pause();
      }
      updatePlayButtonIcons();
    }

    async function toggleFullscreen() {
      const target = elements.tvShell;

      if (!document.fullscreenElement) {
        if (target.requestFullscreen) {
          await target.requestFullscreen();
        }
      } else if (document.exitFullscreen) {
        await document.exitFullscreen();
      }
    }

    async function initializePlayer() {
      state.context = inferGitHubContext();
      state.titleMap = await loadTitles(state.context);
      state.playlist = await discoverPlaylist(state.context);

      if (state.playlist.length === 0) {
        showEmptyState(
          "No videos found. Add MP4/WEBM/MOV files to your repository and optionally map titles in titles.txt."
        );
        return;
      }

      await loadTrack(0, false);
    }

    elements.btnPlay.addEventListener("click", () => {
      togglePlayPause();
    });
    elements.player.addEventListener("click", () => {
      togglePlayPause();
    });
    elements.btnNext.addEventListener("click", () => {
      nextTrack();
    });
    elements.btnPrev.addEventListener("click", () => {
      previousTrack();
    });
    elements.btnRewind.addEventListener("click", () => {
      seekBy(-10);
    });
    elements.btnFastForward.addEventListener("click", () => {
      seekBy(10);
    });
    elements.btnFullscreen.addEventListener("click", () => {
      toggleFullscreen();
    });

    elements.seekBar.addEventListener("input", () => {
      state.isScrubbing = true;
      const video = elements.player;
      if (!Number.isFinite(video.duration) || video.duration <= 0) {
        return;
      }
      const ratio = Number(elements.seekBar.value) / 1000;
      const nextTime = ratio * video.duration;
      video.currentTime = nextTime;
      updateSeekUI();
    });

    elements.seekBar.addEventListener("change", () => {
      state.isScrubbing = false;
      updateSeekUI();
    });

    elements.player.addEventListener("timeupdate", updateSeekUI);
    elements.player.addEventListener("durationchange", updateSeekUI);
    elements.player.addEventListener("play", updatePlayButtonIcons);
    elements.player.addEventListener("pause", updatePlayButtonIcons);
    elements.player.addEventListener("ended", () => {
      nextTrack();
    });

    elements.player.addEventListener("error", async () => {
      if (state.playlist.length <= 1) {
        showEmptyState("Video failed to load. Check file accessibility and format.");
        return;
      }
      elements.statusLabel.textContent = "Skipping broken video...";
      await new Promise(resolve => setTimeout(resolve, RETRY_DELAY_MS));
      await nextTrack();
    });

    document.addEventListener("keydown", (event) => {
      const tag = event.target.tagName.toLowerCase();
      if (tag === "input" || tag === "textarea") {
        return;
      }

      const key = event.key.toLowerCase();
      if (key === " " || key === "k") {
        event.preventDefault();
        togglePlayPause();
      } else if (key === "arrowleft") {
        event.preventDefault();
        seekBy(-5);
      } else if (key === "arrowright") {
        event.preventDefault();
        seekBy(5);
      } else if (key === "j") {
        event.preventDefault();
        seekBy(-10);
      } else if (key === "l") {
        event.preventDefault();
        seekBy(10);
      } else if (key === "n") {
        event.preventDefault();
        nextTrack();
      } else if (key === "p") {
        event.preventDefault();
        previousTrack();
      } else if (key === "f") {
        event.preventDefault();
        toggleFullscreen();
      }
    });

    setControlsDisabled(true);
    initializePlayer();
  </script>
</body>
</html>
