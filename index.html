<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  SUNSET HOUSE — Landing Page                                 ║
    ║  To update: edit the MIXTAPES array below in <script>.      ║
    ║  Files expected in the same directory as this HTML file:    ║
    ║    • sunset-dance-loop.mp4   (hero looping video)           ║
    ║    • hero-poster.jpg         (static fallback for video)    ║
    ║    • artwork-1.jpg, artwork-2.jpg, artwork-3.jpg            ║
    ║    • mixtape1.mp3, mixtape2.mp3, mixtape3.mp3               ║
    ╚══════════════════════════════════════════════════════════════╝
  -->
  <title>Sunset House</title>
  <meta name="description" content="Three House music mixtapes. One golden hour. The Andaman Sea at dusk." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#FFF8F0",
          },
        },
      },
    };
  </script>

  <style>
    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: #111111;
      color: #FFF8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 0; }

    /* ── Nav (frosted glass) ────────────────────────────── */
    .nav-bar {
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      background: rgba(17, 17, 17, 0.68);
      border-bottom: 1px solid rgba(255, 248, 240, 0.06);
    }
    .nav-link {
      color: rgba(255, 248, 240, 0.5);
      font-size: 0.78rem;
      letter-spacing: 0.07em;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .nav-link:hover { color: #FFF8F0; }

    /* ── Hero ───────────────────────────────────────────── */
    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(17,17,17,0.30) 0%,
          rgba(17,17,17,0.06) 35%,
          rgba(17,17,17,0.50) 80%,
          rgba(17,17,17,0.95) 100%);
      z-index: 1;
    }

    /* ── CTA button ─────────────────────────────────────── */
    .cta-btn {
      background: rgba(255, 248, 240, 0.09);
      border: 1px solid rgba(255, 248, 240, 0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #FFF8F0;
      text-decoration: none;
      border-radius: 99px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      transition: background 0.25s ease, border-color 0.25s ease,
                  transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .cta-btn:hover {
      background: rgba(255, 248, 240, 0.17);
      border-color: rgba(255, 248, 240, 0.38);
      transform: scale(1.04);
    }
    .cta-btn:active { transform: scale(0.97); }

    /* ── Cards ──────────────────────────────────────────── */
    .mixtape-card {
      background: #1C1C1E;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition:
        transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.45s ease,
        border-color 0.3s ease;
    }
    .mixtape-card:hover {
      transform: translateY(-7px) scale(1.018);
      box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 8px 20px rgba(0,0,0,0.4);
    }
    .card-artwork {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .mixtape-card:hover .card-artwork {
      transform: scale(1.04);
    }
    .mixtape-card.is-active {
      border-color: rgba(232, 93, 4, 0.6);
      box-shadow: 0 0 0 0px rgba(232, 93, 4, 0),
                  0 20px 50px rgba(232, 93, 4, 0.14),
                  0 8px 20px rgba(0,0,0,0.45);
    }
    /* Play icon hover overlay */
    .card-play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.32);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .mixtape-card:hover .card-play-overlay { opacity: 1; }
    .card-play-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 248, 240, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transform: scale(0.88);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .mixtape-card:hover .card-play-circle { transform: scale(1); }
    /* Now-playing bars (active + playing) */
    .card-bars {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.28);
    }
    .card-bars.show { display: flex; }
    .bar {
      width: 3px;
      border-radius: 99px;
      background: #FFB703;
      margin: 0 1.5px;
    }
    .b1 { animation: b1 0.8s ease-in-out infinite; }
    .b2 { animation: b2 0.8s ease-in-out infinite 0.12s; }
    .b3 { animation: b3 0.8s ease-in-out infinite 0.24s; }
    @keyframes b1 { 0%,100%{height:6px} 50%{height:18px} }
    @keyframes b2 { 0%,100%{height:16px} 50%{height:7px} }
    @keyframes b3 { 0%,100%{height:9px} 50%{height:17px} }

    /* ── Fixed Player Bar ───────────────────────────────── */
    .player-bar {
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      background: rgba(14, 14, 14, 0.88);
      border-top: 1px solid rgba(255, 248, 240, 0.07);
      transform: translateY(100%);
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .player-bar.visible { transform: translateY(0); }

    /* Progress bar */
    .progress-track {
      position: relative;
      height: 3px;
      background: rgba(255, 248, 240, 0.1);
      border-radius: 99px;
      cursor: pointer;
      transition: height 0.2s ease;
    }
    .progress-track:hover { height: 5px; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #E85D04, #FFB703);
      border-radius: 99px;
      pointer-events: none;
      will-change: width;
    }
    .progress-thumb {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #FFF8F0;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    .progress-track:hover .progress-thumb { transform: translate(-50%, -50%) scale(1); }

    /* Control buttons */
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: rgba(255, 248, 240, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 8px;
    }
    .ctrl-btn:hover { color: #FFF8F0; transform: scale(1.12); }
    .ctrl-btn:active { transform: scale(0.9); }

    .play-pause-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 248, 240, 0.95);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.2s ease;
      box-shadow: 0 2px 14px rgba(0,0,0,0.35);
    }
    .play-pause-btn:hover { transform: scale(1.09); background: #fff; }
    .play-pause-btn:active { transform: scale(0.94); }

    /* ── Scroll Reveal ──────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.75s ease, transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── Tabular nums for time ──────────────────────────── */
    .tnum { font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }

    /* ── Mobile menu ────────────────────────────────────── */
    .mobile-menu {
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      background: rgba(17, 17, 17, 0.96);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .mobile-menu.open { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     NAV
══════════════════════════════════════════════════════════════ -->
<nav class="nav-bar fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 md:px-12" style="height:56px;" aria-label="Main navigation">

  <!-- Brand — swap the name here -->
  <a href="#" class="text-sm font-semibold tracking-widest" style="color:#FFF8F0; text-decoration:none; letter-spacing:0.15em;">
    SUNSET HOUSE
  </a>

  <!-- Desktop nav links -->
  <div class="hidden md:flex items-center gap-8">
    <a href="#collection" class="nav-link">The Collection</a>
  </div>

  <!-- Mobile hamburger -->
  <button
    id="menuBtn"
    class="md:hidden flex flex-col justify-center gap-1.5 w-9 h-9 rounded-lg"
    style="background:none; border:none; cursor:pointer; padding:6px;"
    aria-label="Open navigation menu"
    aria-expanded="false"
    aria-controls="mobileMenu"
  >
    <span id="mLine1" class="block h-px" style="background:#FFF8F0; width:20px; transition:transform 0.3s ease, opacity 0.3s ease;"></span>
    <span id="mLine2" class="block h-px" style="background:#FFF8F0; width:14px; transition:transform 0.3s ease, width 0.3s ease;"></span>
  </button>
</nav>

<!-- Mobile Menu Overlay -->
<div id="mobileMenu" class="mobile-menu fixed inset-0 z-40 flex flex-col items-center justify-center gap-10" aria-hidden="true" role="dialog" aria-label="Navigation menu">
  <a href="#collection" id="mobileCollLink" class="text-2xl font-light tracking-widest" style="color:#FFF8F0; text-decoration:none; letter-spacing:0.2em;">
    THE COLLECTION
  </a>
</div>


<!-- ══════════════════════════════════════════════════════════════
     HERO
══════════════════════════════════════════════════════════════ -->
<section
  class="relative flex items-center justify-center"
  style="height: 100svh; min-height: 600px;"
  aria-label="Hero — Sunset House"
>
  <!--
    ⬇ Replace sunset-dance-loop.mp4 with your final optimized video.
      Recommended: H.264, 1920×1080, 8–15 seconds, seamless loop, ~4–8 MB.
      Replace hero-poster.jpg with a single beautiful still frame for fallback.
  -->
  <video
    class="hero-video"
    src="sunset-dance-loop.mp4"
    poster="hero-poster.jpg"
    autoplay
    muted
    loop
    playsinline
    preload="metadata"
    aria-hidden="true"
  ></video>

  <!-- Cinematic gradient overlay — keeps the video alive but text legible -->
  <div class="hero-overlay" aria-hidden="true"></div>

  <!-- Centered hero content -->
  <div class="relative z-10 text-center px-6" style="max-width: 640px;">
    <p class="text-xs font-medium tracking-widest mb-5" style="color: rgba(255, 183, 3, 0.8); letter-spacing: 0.24em;">
      A CURATED HOUSE MUSIC EXPERIENCE
    </p>
    <h1
      class="font-semibold leading-none mb-5"
      style="font-size: clamp(3.2rem, 9vw, 6.5rem); letter-spacing: -0.025em; color: #FFF8F0;"
    >
      Sunset House
    </h1>
    <p
      class="font-light leading-relaxed mb-10 mx-auto"
      style="font-size: clamp(1rem, 2vw, 1.15rem); color: rgba(255, 248, 240, 0.58); max-width: 34ch; line-height: 1.7;"
    >
      Three mixtapes. One golden hour.<br>The Andaman Sea at dusk.
    </p>
    <a href="#collection" class="cta-btn" aria-label="Scroll to the mixtape collection">
      Explore the Collection
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>

  </div>

  <!-- Subtle scroll nudge line -->
  <div
    class="absolute bottom-10 left-1/2 -translate-x-1/2 z-10"

    style="width: 1px; height: 40px; background: linear-gradient(to bottom, transparent, rgba(255,248,240,0.25));"
  ></div>
</section>


<!-- ══════════════════════════════════════════════════════════════
     COLLECTION
══════════════════════════════════════════════════════════════ -->
<section
  id="collection"
  style="background: #111111; padding: clamp(80px, 12vw, 140px) 24px clamp(120px, 16vw, 180px);"

>
  <div style="max-width: 980px; margin: 0 auto;">

    <!-- Section header -->
    <div class="reveal mb-14 md:mb-20">
      <p class="text-xs font-medium tracking-widest mb-3" style="color: rgba(255, 183, 3, 0.65); letter-spacing: 0.24em;">

      <h2

    <!-- Mixtape card grid — built by JS -->

<!-- ══════════════════════════════════════════════════════════════
     PLAYER BAR (fixed bottom)
══════════════════════════════════════════════════════════════ -->
<div
  id="playerBar"
  class="player-bar fixed bottom-0 left-0 right-0 z-50"
  style="padding-bottom: env(safe-area-inset-bottom, 0px);"
  role="region"
  aria-label="Audio player"
>
  <!-- Warm accent line at top of bar -->
  <div style="height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(232,93,4,0.35) 30%, rgba(255,183,3,0.35) 70%, transparent 100%);"></div>

  <div class="flex items-center gap-3 md:gap-5 px-4 md:px-8" style="height: 76px; max-width: 1280px; margin: 0 auto;">

    <!-- LEFT: Artwork + Title -->
    <div class="flex items-center gap-3 min-w-0" style="flex: 1; max-width: 220px;">
      <div
        class="flex-shrink-0 rounded-lg overflow-hidden"
        style="width: 44px; height: 44px; box-shadow: 0 2px 14px rgba(0,0,0,0.5);"
      >
        <!-- ⬇ Updated dynamically by JS -->
        <img id="playerArtwork" src="" alt="" class="w-full h-full object-cover" />
      </div>
      <div class="min-w-0">
        <p id="playerTitle" class="text-sm font-medium truncate" style="color: #FFF8F0; line-height: 1.2;"></p>
        <p id="playerSub" class="text-xs truncate mt-0.5" style="color: rgba(255,248,240,0.38); font-size: 0.7rem;"></p>
      </div>
    </div>

    <!-- CENTER: Controls + Progress -->
    <div class="flex flex-col items-center gap-2 min-w-0" style="flex: 2;">

      <!-- Playback controls -->
      <div class="flex items-center gap-4 md:gap-6">

        <!-- Rewind 10s -->
        <button id="rewindBtn" class="ctrl-btn" aria-label="Rewind 10 seconds">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.59"/>
            <text x="12" y="13.5" text-anchor="middle" dominant-baseline="middle"
              font-size="5.5" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,sans-serif"
              fill="currentColor" stroke="none">10</text>
          </svg>
        </button>

        <!-- Play / Pause -->
        <button id="playPauseBtn" class="play-pause-btn" aria-label="Play">
          <svg id="iconPlay" width="15" height="15" viewBox="0 0 24 24" fill="#111" aria-hidden="true">
            <polygon points="8 6 19 12 8 18 8 6"/>
          </svg>
          <svg id="iconPause" width="15" height="15" viewBox="0 0 24 24" fill="#111" aria-hidden="true" style="display:none;">
            <rect x="6" y="5" width="4" height="14"/>
            <rect x="14" y="5" width="4" height="14"/>
          </svg>
        </button>

        <!-- Spacer for visual balance (hidden on mobile) -->
        <div class="hidden md:block" style="width: 19px;"></div>
      </div>

      <!-- Progress bar + time -->
      <div class="flex items-center gap-2 w-full" style="max-width: 420px;">
        <span id="timeEl" class="tnum flex-shrink-0" style="color: rgba(255,248,240,0.38); font-size: 0.66rem;">0:00</span>

        <div
          id="progressTrack"
          class="progress-track"
          style="flex: 1;"
          role="slider"
          tabindex="0"
          aria-label="Playback progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
          <div id="progressThumb" class="progress-thumb" style="left: 0%;"></div>
        </div>

        <span id="durationEl" class="tnum flex-shrink-0" style="color: rgba(255,248,240,0.38); font-size: 0.66rem;">0:00</span>
      </div>
    </div>

    <!-- RIGHT: Mute -->
    <div class="flex items-center justify-end flex-shrink-0" style="flex: 1; max-width: 220px;">
      <button id="muteBtn" class="ctrl-btn" aria-label="Mute">
        <!-- Volume on -->
        <svg id="iconVol" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <!-- Volume muted -->
        <svg id="iconMuted" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none;">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<!-- Spacer pushes content above player bar when visible -->
<div id="playerSpacer" style="height: 0px; transition: height 0.4s ease;"></div>


<!-- ══════════════════════════════════════════════════════════════
     SCRIPTS
══════════════════════════════════════════════════════════════ -->
<script>
  // ──────────────────────────────────────────────────────────────
  // MIXTAPE DATA
  // Update titles, descriptions, and file paths here.
  // Audio files and artwork should be in the same directory as index.html.
  // ──────────────────────────────────────────────────────────────
  const MIXTAPES = [
    {
      id: 1,
      title: "Golden Reverie",
      description: "The sun begins its descent over the Andaman Sea.",
      audio:   "mixtape1.mp3",    // ← your audio file
      artwork: "artwork-1.jpg",   // ← square artwork image (1:1 ratio ideal)
    },
    {
      id: 2,
      title: "Palm Sway",
      description: "Barefoot rhythms under the palms as dusk deepens.",
      audio:   "mixtape2.mp3",
      artwork: "artwork-2.jpg",
    },
    {
      id: 3,
      title: "Afterglow",
      description: "The full embrace of night.",
      audio:   "mixtape3.mp3",
      artwork: "artwork-3.jpg",
    },
  ];

  // ──────────────────────────────────────────────────────────────
  // STATE
  // ──────────────────────────────────────────────────────────────
  let currentIdx = null;
  let isPlaying  = false;
  const audio = new Audio();
  audio.preload = "metadata";

  // ──────────────────────────────────────────────────────────────
  // DOM REFS
  // ──────────────────────────────────────────────────────────────
  const cardsGrid     = document.getElementById("cardsGrid");
  const playerBar     = document.getElementById("playerBar");
  const playerSpacer  = document.getElementById("playerSpacer");
  const playerArtwork = document.getElementById("playerArtwork");
  const playerTitle   = document.getElementById("playerTitle");
  const playerSub     = document.getElementById("playerSub");
  const playPauseBtn  = document.getElementById("playPauseBtn");
  const iconPlay      = document.getElementById("iconPlay");
  const iconPause     = document.getElementById("iconPause");
  const rewindBtn     = document.getElementById("rewindBtn");
  const muteBtn       = document.getElementById("muteBtn");
  const iconVol       = document.getElementById("iconVol");
  const iconMuted     = document.getElementById("iconMuted");
  const progressTrack = document.getElementById("progressTrack");
  const progressFill  = document.getElementById("progressFill");
  const progressThumb = document.getElementById("progressThumb");
  const timeEl        = document.getElementById("timeEl");
  const durationEl    = document.getElementById("durationEl");

  // ──────────────────────────────────────────────────────────────
  // UTILITIES
  // ──────────────────────────────────────────────────────────────
  function fmtTime(s) {
    if (!isFinite(s) || s < 0) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, "0")}`;
  }

  // ──────────────────────────────────────────────────────────────
  // BUILD CARDS
  // ──────────────────────────────────────────────────────────────
  function buildCards() {
    MIXTAPES.forEach((mix, idx) => {
      const delay = idx * 90;
      const card = document.createElement("article");
      card.className = "mixtape-card reveal";
      card.style.transitionDelay = `${delay}ms`;
      card.setAttribute("tabindex", "0");
      card.setAttribute("role", "button");
      card.setAttribute("aria-label", `Play mixtape: ${mix.title}`);
      card.dataset.idx = idx;

      card.innerHTML = `
        <div style="position:relative; overflow:hidden;">
          <img
            class="card-artwork"
            src="${mix.artwork}"
            alt="${mix.title} artwork"
            loading="lazy"
          />
          <div class="card-play-overlay" aria-hidden="true">
            <div class="card-play-circle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#111" aria-hidden="true">
                <polygon points="8 6 19 12 8 18 8 6"/>
              </svg>
            </div>
          </div>
          <div class="card-bars" id="bars-${idx}" aria-hidden="true">
            <span class="bar b1" style="height:6px;"></span>
            <span class="bar b2" style="height:14px;"></span>
            <span class="bar b3" style="height:9px;"></span>
          </div>
        </div>
        <div style="padding: 16px 18px 20px;">
          <h3 style="color:#FFF8F0; font-size:1rem; font-weight:600; letter-spacing:-0.01em; margin:0 0 5px;">${mix.title}</h3>
          <p style="color:rgba(255,248,240,0.42); font-size:0.75rem; line-height:1.55; margin:0;">${mix.description}</p>
        </div>
      `;

      card.addEventListener("click", () => loadMixtape(idx));
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          loadMixtape(idx);
        }
      });

      cardsGrid.appendChild(card);
    });
  }

  function updateCards() {
    document.querySelectorAll(".mixtape-card").forEach((card, i) => {
      const isActive = i === currentIdx;
      const bars = document.getElementById(`bars-${i}`);
      card.classList.toggle("is-active", isActive);
      if (bars) bars.classList.toggle("show", isActive && isPlaying);
    });
  }

  // ──────────────────────────────────────────────────────────────
  // LOAD MIXTAPE
  // ──────────────────────────────────────────────────────────────
  function loadMixtape(idx) {
    const mix = MIXTAPES[idx];
    if (!mix) return;

    // If same track: toggle play/pause
    if (idx === currentIdx) {
      togglePlayPause();
      return;
    }

    currentIdx = idx;

    // Update audio source
    audio.src = mix.audio;
    audio.currentTime = 0;

    // Update player bar meta
    playerArtwork.src   = mix.artwork;
    playerArtwork.alt   = `${mix.title} artwork`;
    playerTitle.textContent = mix.title;
    playerSub.textContent   = mix.description;

    // Show player bar
    playerBar.classList.add("visible");
    playerSpacer.style.height = "76px";

    // Autoplay on selection
    audio.play().then(() => {
      setPlaying(true);
    }).catch(() => {});
  }

  // ──────────────────────────────────────────────────────────────
  // PLAY / PAUSE
  // ──────────────────────────────────────────────────────────────
  function togglePlayPause() {
    if (audio.paused) {
      audio.play().then(() => setPlaying(true)).catch(() => {});
    } else {
      audio.pause();
    }
  }

  function setPlaying(state) {
    isPlaying = state;
    iconPlay.style.display  = state ? "none"  : "block";
    iconPause.style.display = state ? "block" : "none";
    playPauseBtn.setAttribute("aria-label", state ? "Pause" : "Play");
    updateCards();
  }

  // ──────────────────────────────────────────────────────────────
  // PROGRESS BAR
  // ──────────────────────────────────────────────────────────────
  function updateProgress() {
    const dur = audio.duration;
    if (!dur || !isFinite(dur)) return;
    const pct = (audio.currentTime / dur) * 100;
    progressFill.style.width = `${pct}%`;
    progressThumb.style.left = `${pct}%`;
    timeEl.textContent = fmtTime(audio.currentTime);
    progressTrack.setAttribute("aria-valuenow", Math.round(pct));
  }

  function seekFromEvent(e) {
    if (!audio.duration) return;
    const rect = progressTrack.getBoundingClientRect();
    const x = Math.max(0, Math.min((e.clientX ?? e.touches?.[0]?.clientX ?? 0) - rect.left, rect.width));
    audio.currentTime = (x / rect.width) * audio.duration;
  }

  let dragging = false;
  progressTrack.addEventListener("mousedown", (e) => { dragging = true; seekFromEvent(e); });
  document.addEventListener("mousemove",  (e) => { if (dragging) seekFromEvent(e); });
  document.addEventListener("mouseup",    ()  => { dragging = false; });
  progressTrack.addEventListener("touchstart", (e) => seekFromEvent(e), { passive: true });
  progressTrack.addEventListener("touchmove",  (e) => seekFromEvent(e), { passive: true });
  progressTrack.addEventListener("keydown", (e) => {
    if (!audio.duration) return;
    const step = audio.duration * 0.02;
    if (e.key === "ArrowRight") { audio.currentTime = Math.min(audio.duration, audio.currentTime + step); e.preventDefault(); }
    if (e.key === "ArrowLeft")  { audio.currentTime = Math.max(0, audio.currentTime - step); e.preventDefault(); }
  });

  // ──────────────────────────────────────────────────────────────
  // AUDIO EVENTS
  // ──────────────────────────────────────────────────────────────
  audio.addEventListener("timeupdate",     updateProgress);
  audio.addEventListener("loadedmetadata", () => { durationEl.textContent = fmtTime(audio.duration); });
  audio.addEventListener("play",           () => setPlaying(true));
  audio.addEventListener("pause",          () => setPlaying(false));
  audio.addEventListener("ended",          () => setPlaying(false));

  // ──────────────────────────────────────────────────────────────
  // CONTROLS
  // ──────────────────────────────────────────────────────────────
  playPauseBtn.addEventListener("click", () => {
    if (currentIdx === null) return;
    togglePlayPause();
  });

  rewindBtn.addEventListener("click", () => {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  });

  muteBtn.addEventListener("click", () => {
    audio.muted = !audio.muted;
    iconVol.style.display   = audio.muted ? "none"  : "block";
    iconMuted.style.display = audio.muted ? "block" : "none";
    muteBtn.setAttribute("aria-label", audio.muted ? "Unmute" : "Mute");
  });

  // ──────────────────────────────────────────────────────────────
  // KEYBOARD SHORTCUTS (global, not inside inputs/buttons)
  // ──────────────────────────────────────────────────────────────
  document.addEventListener("keydown", (e) => {
    if (e.target.closest("button, input, textarea, select, [contenteditable]")) return;
    if (e.key === " ")              { e.preventDefault(); if (currentIdx !== null) togglePlayPause(); }
    if (e.key === "ArrowLeft")      { e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 10); }
    if (e.key === "ArrowRight")     { e.preventDefault(); audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); }
    if (e.key.toLowerCase() === "m"){ muteBtn.click(); }
  });

  // ──────────────────────────────────────────────────────────────
  // MOBILE MENU
  // ──────────────────────────────────────────────────────────────
  const menuBtn     = document.getElementById("menuBtn");
  const mobileMenu  = document.getElementById("mobileMenu");
  const mLine1      = document.getElementById("mLine1");
  const mLine2      = document.getElementById("mLine2");
  let menuOpen = false;

  function toggleMenu(force) {
    menuOpen = (force !== undefined) ? force : !menuOpen;
    mobileMenu.classList.toggle("open", menuOpen);
    mobileMenu.setAttribute("aria-hidden", String(!menuOpen));
    menuBtn.setAttribute("aria-expanded", String(menuOpen));
    document.body.style.overflow = menuOpen ? "hidden" : "";
    if (menuOpen) {
      mLine1.style.transform = "rotate(45deg) translate(0, 6px)";
      mLine2.style.transform = "rotate(-45deg) translate(0, -6px)";
      mLine2.style.width = "20px";
    } else {
      mLine1.style.transform = "";
      mLine2.style.transform = "";
      mLine2.style.width = "14px";
    }
  }

  menuBtn.addEventListener("click", () => toggleMenu());
  document.getElementById("mobileCollLink").addEventListener("click", () => toggleMenu(false));
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && menuOpen) toggleMenu(false); });

  // ──────────────────────────────────────────────────────────────
  // SCROLL REVEAL
  // ──────────────────────────────────────────────────────────────
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });

  function observeReveal() {
    document.querySelectorAll(".reveal").forEach((el) => revealObserver.observe(el));
  }

  // ──────────────────────────────────────────────────────────────
  // INIT
  // ──────────────────────────────────────────────────────────────
  buildCards();
  observeReveal();
</script>

</body>
</html>
