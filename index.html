<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #121212;
      --accent: #0a84ff;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px 16px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      margin: 0 0 32px;
    }
    .player-section {
      background: var(--surface);
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 40px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }
    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    .current-title {
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      flex: 1;
    }
    .lock-btn {
      background: #1f1f1f;
      color: #f5f5f7;
      border: none;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 44px;
    }
    .lock-btn:active { transform: scale(0.97); }
    .lock-btn.locked { background: #1e3a8a; color: #fff; }
    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .playlist-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .video-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .video-card {
      min-width: 180px;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      scroll-snap-align: start;
      border: 1px solid #222;
      transition: transform 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .video-card:active {
      transform: scale(0.985);
    }
    .video-card.active {
      border-color: var(--accent);
      background: #1f1f1f;
    }
    .video-number {
      font-size: 0.8rem;
      color: #888;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .video-title {
      font-size: 1.05rem;
      line-height: 1.35;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    @media (max-width: 480px) {
      .video-card { min-width: 160px; padding: 16px 18px; }
      .current-title { font-size: 1.05rem; }
      body { padding: 16px 12px; }
    }
  </style>
</head>
<body>
  <h1>Video Hub</h1>

  <!-- Player -->
  <div class="player-section">
    <div class="player-header">
      <div class="current-title" id="currentTitle">Select a video</div>
      <button id="lockBtn" class="lock-btn" onclick="toggleOrientationLock()">
        <span id="lockIcon">🔓</span>
        <span id="lockText">Lock</span>
      </button>
    </div>
    <video id="player" playsinline></video>
  </div>

  <!-- Playlist -->
  <div>
    <div class="playlist-header">
      <h2>Playlist</h2>
    </div>
    <div class="video-row" id="videoRow"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    // =====================================================
    // SETUP INSTRUCTIONS:
    // 1. Create a folder called "videos" in your repo
    // 2. Put your videos inside as: video1.mp4, video2.mp4, video3.mp4...
    // 3. Create a file called "titles.txt" in the same folder as index.html
    //    - One title per line (first line = title for video1.mp4)
    // 4. Push everything to GitHub and enable GitHub Pages
    // =====================================================

    let videos = [];
    let player;
    let currentVideoId = null;
    let isLocked = false;

    async function loadTitlesAndVideos() {
      let titles = [];
      try {
        const res = await fetch('titles.txt');
        if (res.ok) {
          const text = await res.text();
          titles = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        }
      } catch (e) {}

      const count = titles.length > 0 ? titles.length : 5;
      videos = [];
      for (let i = 1; i <= count; i++) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `videos/video${i}.mp4`
        });
      }
    }

    function initPlayer() {
      const videoEl = document.getElementById('player');
      player = new Plyr(videoEl, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
        settings: ['speed']
      });

      // Show helpful message if video fails to load
      videoEl.addEventListener('error', () => {
        document.getElementById('currentTitle').textContent = 
          'Video failed to load. Make sure videos/video1.mp4 exists in your repo.';
        console.error('Failed to load:', videoEl.src);
      });

      player.on('ended', () => {
        const idx = videos.findIndex(v => v.id === currentVideoId);
        const next = (idx + 1) % videos.length;
        loadVideo(videos[next].id);
      });
    }

    function renderPlaylist() {
      const row = document.getElementById('videoRow');
      row.innerHTML = '';
      videos.forEach(video => {
        const card = document.createElement('div');
        card.className = `video-card ${video.id === currentVideoId ? 'active' : ''}`;
        card.innerHTML = `
          <div class="video-number">#${video.id}</div>
          <div class="video-title">${video.title}</div>
        `;
        card.onclick = () => loadVideo(video.id);
        row.appendChild(card);
      });
    }

    function loadVideo(videoId) {
      const video = videos.find(v => v.id === videoId);
      if (!video) return;

      const videoEl = document.getElementById('player');
      const titleEl = document.getElementById('currentTitle');

      videoEl.src = video.src;
      titleEl.textContent = video.title;
      currentVideoId = videoId;

      renderPlaylist();

      const active = document.querySelector('.video-card.active');
      if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center' });

      videoEl.play().catch(() => {});
    }

    async function toggleOrientationLock() {
      const btn = document.getElementById('lockBtn');
      const icon = document.getElementById('lockIcon');
      const text = document.getElementById('lockText');

      if (!screen.orientation?.lock) {
        alert("Orientation lock is not supported on this device.");
        return;
      }

      try {
        if (!isLocked) {
          await screen.orientation.lock('landscape');
          isLocked = true;
          btn.classList.add('locked');
          icon.textContent = '🔒';
          text.textContent = 'Unlock';
        } else {
          await screen.orientation.unlock();
          isLocked = false;
          btn.classList.remove('locked');
          icon.textContent = '🔓';
          text.textContent = 'Lock';
        }
      } catch (e) {
        alert("Try tapping the fullscreen button first, then tap Lock.");
      }
    }

    async function init() {
      await loadTitlesAndVideos();
      initPlayer();
      renderPlaylist();
    }

    window.onload = init;
  </script>
</body>
</html>
