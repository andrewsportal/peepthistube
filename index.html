<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Retro TV Player</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css" />
  <style>
    :root {
      --wallpaper-light: #f5f2eb;
      --wallpaper-mid: #e9e3d8;
      --wallpaper-line: rgba(70, 60, 44, 0.06);

      --desk-top: #cda476;
      --desk-front-light: #b99063;
      --desk-front-dark: #9b764e;

      --tv-metal-1: #f1e7d6;
      --tv-metal-2: #d6c3a5;
      --tv-panel: #d8c8b2;
      --bezel: #1e1f23;

      --accent: #0a84ff;
      --control-text: rgba(46, 39, 29, 0.92);
      --label-text: rgba(70, 55, 36, 0.84);
      --focus-ring: rgba(10, 132, 255, 0.44);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 22px;

      --ease-apple: cubic-bezier(0.22, 1, 0.36, 1);
      --transition-fast: 180ms var(--ease-apple);
      --transition-base: 240ms var(--ease-apple);

      --plyr-color-main: var(--accent);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      background: #11141a;
      color: #1f232b;
    }

    .scene {
      position: relative;
      min-height: 100svh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: calc(clamp(10px, 2vh, 24px) + env(safe-area-inset-top, 0px));
      padding-right: max(12px, env(safe-area-inset-right, 0px));
      padding-bottom: calc(clamp(10px, 2vh, 24px) + env(safe-area-inset-bottom, 0px));
      padding-left: max(12px, env(safe-area-inset-left, 0px));
      background:
        radial-gradient(1200px 620px at 50% 8%, rgba(255, 255, 255, 0.3) 0%, transparent 60%),
        repeating-linear-gradient(90deg, transparent 0, transparent 32px, var(--wallpaper-line) 32px, var(--wallpaper-line) 33px),
        linear-gradient(180deg, var(--wallpaper-light) 0%, var(--wallpaper-mid) 100%);
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 30%, transparent 100%);
      z-index: 0;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 34svh;
      pointer-events: none;
      background: linear-gradient(180deg, transparent 0%, rgba(62, 36, 16, 0.16) 56%, rgba(40, 22, 10, 0.3) 100%);
      z-index: 0;
    }

    .desk {
      position: absolute;
      inset: auto 0 0;
      height: clamp(120px, 19svh, 220px);
      background:
        linear-gradient(90deg, rgba(139, 96, 48, 0.28) 0 8px, transparent 8px 24px),
        linear-gradient(180deg, var(--desk-front-light) 0%, var(--desk-front-dark) 100%);
      border-top: 10px solid #d8b183;
      box-shadow:
        inset 0 20px 35px rgba(54, 32, 16, 0.2),
        inset 0 -28px 30px rgba(67, 42, 20, 0.16);
      z-index: 1;
    }

    .tv-stage {
      width: min(1180px, 100%);
      position: relative;
      z-index: 2;
      transform: translateY(clamp(0px, 0.9vh, 10px));
    }

    .tv-stage::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -28px;
      width: min(920px, 84%);
      height: 62px;
      border-radius: 999px;
      filter: blur(18px);
      background: rgba(23, 12, 6, 0.35);
      z-index: -1;
    }

    .tv-set {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 2.1fr) minmax(270px, 1fr);
      gap: clamp(12px, 1.6vw, 19px);
      border-radius: var(--radius-xl);
      padding: clamp(12px, 1.8vw, 18px);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.76) 0%, rgba(255, 255, 255, 0.06) 42%),
        linear-gradient(145deg, var(--tv-metal-1) 0%, var(--tv-metal-2) 100%);
      border: 1px solid rgba(255, 248, 236, 0.92);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.84),
        inset 0 -2px 0 rgba(132, 106, 66, 0.3),
        0 14px 28px rgba(31, 17, 7, 0.2),
        0 30px 56px rgba(0, 0, 0, 0.24);
      transition: all var(--transition-base);
    }

    .screen-chassis {
      background: linear-gradient(180deg, #2a2d33 0%, #191b20 100%);
      border-radius: var(--radius-lg) calc(var(--radius-lg) + 4px) calc(var(--radius-lg) + 4px) var(--radius-lg);
      padding: clamp(10px, 1.4vw, 14px);
      box-shadow:
        inset 0 14px 24px rgba(0, 0, 0, 0.52),
        inset 0 1px 2px rgba(255, 255, 255, 0.22),
        1px 0 2px rgba(255, 255, 255, 0.14);
      display: flex;
    }

    .tv-screen {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
      background: #040404;
      box-shadow:
        inset 0 0 42px rgba(0, 0, 0, 0.9),
        0 0 20px rgba(0, 0, 0, 0.54);
      isolation: isolate;
    }

    .tv-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(168deg, rgba(255, 255, 255, 0.12) 0 18%, rgba(255, 255, 255, 0) 40%),
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.032) 0 1px, transparent 1px 3px);
      z-index: 7;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .plyr {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: #000;
    }

    .plyr__controls {
      display: none !important;
    }

    .osd-title {
      position: absolute;
      left: clamp(12px, 2vw, 26px);
      bottom: clamp(12px, 2.2vw, 26px);
      z-index: 12;
      color: #d4ffd5;
      font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.72rem, 1.2vw, 0.95rem);
      letter-spacing: 0.055em;
      text-shadow: 0 0 8px rgba(114, 255, 118, 0.48);
      opacity: 0;
      transform: translateY(6px);
      transition: all var(--transition-fast);
      pointer-events: none;
    }

    .osd-title.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .control-panel {
      border-radius: var(--radius-lg);
      padding: clamp(11px, 1.3vw, 15px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.36) 0%, rgba(255, 255, 255, 0.06) 30%),
        linear-gradient(180deg, rgba(225, 210, 185, 0.88) 0%, rgba(205, 185, 154, 0.9) 100%);
      border: 1px solid rgba(110, 90, 58, 0.2);
      box-shadow:
        inset 3px 0 8px rgba(0, 0, 0, 0.05),
        inset -1px 0 4px rgba(255, 255, 255, 0.5),
        0 10px 24px rgba(37, 22, 9, 0.14);
      backdrop-filter: blur(14px) saturate(125%);
      display: flex;
      flex-direction: column;
      gap: 11px;
      min-height: 100%;
      transition: all var(--transition-base);
    }

    .panel-title {
      margin: 0;
      font-size: 0.72rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--control-text);
      font-weight: 650;
      line-height: 1.2;
    }

    .now-playing {
      position: relative;
      border-radius: var(--radius-md);
      padding: 11px 12px;
      background: rgba(36, 28, 18, 0.12);
      border: 1px solid rgba(89, 61, 26, 0.16);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.26);
      min-height: 64px;
    }

    .now-playing-wrap {
      display: grid;
      gap: 10px;
    }

    .now-playing--interactive {
      width: 100%;
      appearance: none;
      text-align: left;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .now-playing--interactive:hover {
      border-color: rgba(89, 61, 26, 0.3);
      background: rgba(35, 24, 12, 0.17);
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(27, 17, 8, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.2);
    }

    .now-playing--interactive:active {
      transform: translateY(0);
    }

    .now-playing--interactive:focus-visible {
      outline: none;
      border-color: rgba(10, 132, 255, 0.48);
      box-shadow:
        0 0 0 3px var(--focus-ring),
        inset 0 1px 2px rgba(255, 255, 255, 0.24);
    }

    .now-playing-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .menu-indicator {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      border: 1px solid rgba(89, 61, 26, 0.2);
      background: rgba(255, 250, 242, 0.55);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      transition: all var(--transition-fast);
    }

    .menu-indicator svg {
      width: 14px;
      height: 14px;
      color: rgba(74, 50, 23, 0.88);
      display: block;
    }

    .now-playing--interactive[aria-expanded="true"] .menu-indicator {
      transform: rotate(180deg);
      background: rgba(240, 245, 255, 0.72);
      border-color: rgba(10, 132, 255, 0.34);
    }

    .channel-menu {
      position: relative;
      border-radius: 13px;
      border: 1px solid rgba(100, 80, 54, 0.22);
      background: rgba(249, 242, 231, 0.78);
      box-shadow:
        0 12px 24px rgba(33, 19, 7, 0.12),
        inset 0 1px 1px rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(16px) saturate(136%);
      padding: 7px;
      display: grid;
      gap: 6px;
      max-height: min(44vh, 300px);
      overflow: auto;
      animation: menuReveal 180ms var(--ease-apple);
    }

    @keyframes menuReveal {
      from {
        opacity: 0;
        transform: translateY(-4px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .channel-menu[hidden] {
      display: none !important;
    }

    .channel-menu::-webkit-scrollbar {
      width: 10px;
    }

    .channel-menu::-webkit-scrollbar-thumb {
      background: rgba(112, 88, 55, 0.28);
      border-radius: 999px;
      border: 2px solid rgba(0, 0, 0, 0);
      background-clip: padding-box;
    }

    .control-panel.is-browsing .dial-grid,
    .control-panel.is-browsing .speaker-grill {
      display: none;
    }

    .control-panel.is-browsing .credit-line {
      display: none;
    }

    .control-panel.is-browsing .channel-menu {
      max-height: min(40vh, 280px);
    }

    .channel-option {
      appearance: none;
      border: 1px solid transparent;
      background: rgba(46, 30, 12, 0.06);
      color: rgba(27, 21, 14, 0.96);
      border-radius: 10px;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      transition: all var(--transition-fast);
    }

    .channel-option:hover {
      border-color: rgba(107, 71, 31, 0.28);
      background: rgba(46, 30, 12, 0.12);
      transform: translateY(-1px);
    }

    .channel-option:active {
      transform: translateY(0);
    }

    .channel-option:focus-visible {
      outline: none;
      border-color: rgba(10, 132, 255, 0.52);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .channel-option-id {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: rgba(74, 50, 23, 0.78);
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
      font-weight: 620;
    }

    .channel-option-title {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.28;
      letter-spacing: 0.01em;
    }

    .channel-option-check {
      width: 14px;
      height: 14px;
      color: transparent;
      transition: color 120ms var(--ease-apple);
    }

    .channel-option.is-active {
      border-color: rgba(92, 67, 35, 0.4);
      background: rgba(62, 41, 18, 0.14);
    }

    .channel-option.is-active .channel-option-check {
      color: rgba(80, 56, 28, 0.9);
    }

    .now-playing .channel {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: rgba(61, 41, 18, 0.82);
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 620;
    }

    .now-playing .title {
      margin: 0;
      color: rgba(30, 21, 11, 0.96);
      font-size: 0.9rem;
      line-height: 1.32;
      font-weight: 620;
      letter-spacing: 0.005em;
    }

    .dial-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .dial-stack {
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .dial-stack .dial-label {
      color: var(--label-text);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 640;
      line-height: 1.2;
    }

    .dial {
      appearance: none;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      color: inherit;
      transition: all var(--transition-fast);
      display: grid;
      place-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    .dial:hover {
      transform: translateY(-1px);
      box-shadow:
        0 8px 14px rgba(0, 0, 0, 0.2),
        inset 0 1px 3px rgba(255, 255, 255, 0.58),
        inset 0 -2px 5px rgba(73, 46, 12, 0.34);
    }

    .dial:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 3px var(--focus-ring),
        0 0 0 6px rgba(255, 255, 255, 0.62);
    }

    .dial:active {
      transform: scale(0.96);
    }

    .dial--big {
      width: clamp(52px, 5vw, 84px);
      height: clamp(52px, 5vw, 84px);
    }

    .dial svg {
      width: 16px;
      height: 16px;
      display: block;
      color: rgba(25, 17, 8, 0.9);
      z-index: 2;
      position: relative;
    }

    .dial--big svg {
      width: 24px;
      height: 24px;
    }

    .dial--small {
      width: 34px;
      height: 34px;
    }

    .dial--big,
    .dial--small {
      background: radial-gradient(circle at 34% 28%, #fbefd4 0%, #ddb36f 54%, #b8863f 100%);
      box-shadow:
        0 5px 10px rgba(0, 0, 0, 0.2),
        inset 0 1px 3px rgba(255, 255, 255, 0.56),
        inset 0 -2px 6px rgba(73, 46, 12, 0.34);
      border: 1px solid rgba(123, 82, 31, 0.42);
    }

    .dial.is-active {
      box-shadow:
        0 0 0 2px rgba(56, 33, 11, 0.36),
        0 0 0 6px rgba(10, 132, 255, 0.22);
    }

    .speaker-grill {
      width: 100%;
      height: clamp(56px, 8vh, 74px);
      border-radius: 10px;
      background:
        radial-gradient(circle, rgba(123, 95, 57, 0.42) 20%, transparent 21%) 0 0 / 8px 8px,
        linear-gradient(180deg, rgba(150, 116, 73, 0.32), rgba(113, 81, 44, 0.4));
      border: 1px solid rgba(96, 66, 30, 0.28);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.22);
    }

    .credit-line {
      margin: 14px 0 0;
      text-align: center;
      font-size: 0.64rem;
      letter-spacing: 0.09em;
      color: rgba(68, 47, 22, 0.74);
      font-weight: 560;
      line-height: 1.25;
    }

    @media (max-width: 1024px) {
      .tv-set {
        grid-template-columns: 1fr;
      }

      .screen-chassis {
        border-radius: var(--radius-lg);
      }

      .dial-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .scene {
        padding-top: calc(10px + env(safe-area-inset-top, 0px));
        padding-right: max(10px, env(safe-area-inset-right, 0px));
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        padding-left: max(10px, env(safe-area-inset-left, 0px));
      }

      .desk {
        height: 14svh;
      }

      .dial-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .speaker-grill {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <main class="tv-stage">
      <article class="tv-set" aria-label="Retro television player">
        <section class="screen-chassis">
          <div class="tv-screen" id="tvScreen">
            <video id="player" playsinline preload="metadata"></video>
            <div id="osd" class="osd-title" aria-live="polite"></div>
          </div>
        </section>

        <aside class="control-panel" aria-label="Television controls">
          <h1 class="panel-title">Peep This Tube</h1>

          <section class="now-playing-wrap" aria-live="polite">
            <button
              class="now-playing now-playing--interactive"
              id="channelMenuButton"
              type="button"
              aria-label="Open channel menu"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="channelMenu"
            >
              <div class="channel" id="channelLabel">Channel --</div>
              <div class="now-playing-main">
                <span class="title" id="nowPlayingTitle">Loading playlist...</span>
                <span class="menu-indicator" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </span>
              </div>
            </button>
            <div class="channel-menu" id="channelMenu" role="listbox" aria-label="Available videos" hidden></div>
          </section>

          <section class="dial-grid" aria-label="Dial controls">
            <div class="dial-stack">
              <button class="dial dial--small" id="dial-prev" type="button" aria-label="Previous channel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="19" y1="12" x2="5" y2="12"></line>
                  <polyline points="11 6 5 12 11 18"></polyline>
                </svg>
              </button>
              <span class="dial-label">Prev</span>
            </div>
            <div class="dial-stack">
              <button class="dial dial--big" id="dial-play" type="button" aria-label="Play or pause">
                <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <polygon points="8 6 19 12 8 18 8 6"></polygon>
                </svg>
                <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none;">
                  <rect x="7" y="6" width="4" height="12"></rect>
                  <rect x="13" y="6" width="4" height="12"></rect>
                </svg>
              </button>
              <span class="dial-label">Play</span>
            </div>
            <div class="dial-stack">
              <button class="dial dial--small" id="dial-next" type="button" aria-label="Next channel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="13 6 19 12 13 18"></polyline>
                </svg>
              </button>
              <span class="dial-label">Next</span>
            </div>
            <div class="dial-stack">
              <button class="dial dial--small" id="dial-rewind" type="button" aria-label="Rewind 10 seconds">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <polygon points="11 6 5 12 11 18 11 6"></polygon>
                  <polygon points="19 6 13 12 19 18 19 6"></polygon>
                </svg>
              </button>
              <span class="dial-label">Rew</span>
            </div>
            <div class="dial-stack">
              <button class="dial dial--small" id="dial-forward" type="button" aria-label="Fast forward 10 seconds">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <polygon points="5 6 11 12 5 18 5 6"></polygon>
                  <polygon points="13 6 19 12 13 18 13 6"></polygon>
                </svg>
              </button>
              <span class="dial-label">Fwd</span>
            </div>
            <div class="dial-stack">
              <button class="dial dial--small" id="dial-mute" type="button" aria-label="Mute or unmute audio">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polygon points="11 5 6 9 3 9 3 15 6 15 11 19 11 5"></polygon>
                  <line x1="16" y1="9" x2="21" y2="14"></line>
                  <line x1="21" y1="9" x2="16" y2="14"></line>
                </svg>
              </button>
              <span class="dial-label">Mute</span>
            </div>
          </section>

          <div class="speaker-grill" aria-hidden="true"></div>
          <p class="credit-line">Filmed &amp; Edited by: Andrew Rios</p>
        </aside>
      </article>
    </main>

    <div class="desk" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    const PLAYER_ID = "player";
    const TITLE_SOURCE = "titles.txt";

    const videos = [];

    let player;
    let currentId = null;
    let fallbackAttempted = false;
    let osdTimeout;
    let channelMenuVisible = false;

    async function loadTitles() {
      try {
        const response = await fetch(TITLE_SOURCE);
        if (!response.ok) {
          return [];
        }
        return (await response.text())
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    async function loadData() {
      const titles = await loadTitles();
      videos.length = 0;

      for (let i = 1; i <= titles.length; i += 1) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }

      if (!videos.length) {
        videos.push({ id: 1, title: "Video 1", src: "video1.mp4" });
      }
    }

    function getUppercaseSource(src) {
      return src.replace(/\.mp4$/i, ".MP4");
    }

    function padChannel(id) {
      return String(id).padStart(2, "0");
    }

    function showOSD(text, duration = 1700) {
      const osd = document.getElementById("osd");
      osd.textContent = text;
      osd.classList.add("is-visible");
      clearTimeout(osdTimeout);
      osdTimeout = setTimeout(() => {
        osd.classList.remove("is-visible");
      }, duration);
    }

    function updateNowPlaying(video) {
      const channelLabel = document.getElementById("channelLabel");
      const titleLabel = document.getElementById("nowPlayingTitle");
      channelLabel.textContent = `Channel ${padChannel(video.id)}`;
      titleLabel.textContent = video.title;
    }

    function createChannelOption(video) {
      const option = document.createElement("button");
      option.type = "button";
      option.className = "channel-option";
      option.setAttribute("role", "option");
      option.setAttribute("aria-selected", String(video.id === currentId));

      if (video.id === currentId) {
        option.classList.add("is-active");
      }

      const id = document.createElement("span");
      id.className = "channel-option-id";
      id.textContent = `CH ${padChannel(video.id)}`;

      const title = document.createElement("span");
      title.className = "channel-option-title";
      title.textContent = video.title;

      const check = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      check.setAttribute("viewBox", "0 0 24 24");
      check.setAttribute("fill", "none");
      check.setAttribute("stroke", "currentColor");
      check.setAttribute("stroke-width", "2.2");
      check.setAttribute("stroke-linecap", "round");
      check.setAttribute("stroke-linejoin", "round");
      check.classList.add("channel-option-check");
      check.innerHTML = "<polyline points=\"20 6 9 17 4 12\"></polyline>";
      check.setAttribute("aria-hidden", "true");

      option.append(id, title, check);
      option.addEventListener("click", () => {
        loadVideo(video.id);
        setChannelMenuVisible(false);
      });
      return option;
    }

    function renderChannelMenu() {
      const menu = document.getElementById("channelMenu");
      menu.innerHTML = "";
      videos.forEach((video) => {
        menu.appendChild(createChannelOption(video));
      });
    }

    function setChannelMenuVisible(visible) {
      const menu = document.getElementById("channelMenu");
      const trigger = document.getElementById("channelMenuButton");
      const panel = document.querySelector(".control-panel");

      if (visible) {
        renderChannelMenu();
        channelMenuVisible = true;
        menu.hidden = false;
        trigger.setAttribute("aria-expanded", "true");
        panel.classList.add("is-browsing");
        return;
      }

      channelMenuVisible = false;
      trigger.setAttribute("aria-expanded", "false");
      panel.classList.remove("is-browsing");
      menu.hidden = true;
    }

    function setupChannelMenu() {
      const trigger = document.getElementById("channelMenuButton");

      trigger.addEventListener("click", () => {
        setChannelMenuVisible(!channelMenuVisible);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && channelMenuVisible) {
          event.preventDefault();
          setChannelMenuVisible(false);
        }
      });
    }

    function animateDial(element, degrees) {
      element.animate(
        [
          { transform: "rotate(0deg) scale(1)" },
          { transform: `rotate(${degrees}deg) scale(0.96)` },
          { transform: "rotate(0deg) scale(1)" }
        ],
        {
          duration: 170,
          easing: "cubic-bezier(0.22, 1, 0.36, 1)"
        }
      );
    }

    function getCurrentIndex() {
      return videos.findIndex((video) => video.id === currentId);
    }

    function loadVideo(id) {
      const selectedVideo = videos.find((video) => video.id === id);
      if (!selectedVideo) {
        return;
      }
      const videoElement = document.getElementById(PLAYER_ID);

      currentId = id;
      fallbackAttempted = false;
      videoElement.src = selectedVideo.src;
      updateNowPlaying(selectedVideo);
      renderChannelMenu();

      showOSD(`CH ${padChannel(selectedVideo.id)} • ${selectedVideo.title.toUpperCase()}`);
      videoElement.play().catch(() => {});
    }

    function stepChannel(step) {
      if (!videos.length) {
        return;
      }
      const currentIndex = getCurrentIndex();
      const safeIndex = currentIndex >= 0 ? currentIndex : 0;
      const nextIndex = (safeIndex + step + videos.length) % videos.length;
      loadVideo(videos[nextIndex].id);
    }

    function setupDials() {
      const dialPrev = document.getElementById("dial-prev");
      const dialNext = document.getElementById("dial-next");
      const dialPlay = document.getElementById("dial-play");
      const playIcon = dialPlay.querySelector(".icon-play");
      const pauseIcon = dialPlay.querySelector(".icon-pause");
      const dialMute = document.getElementById("dial-mute");
      const dialRewind = document.getElementById("dial-rewind");
      const dialForward = document.getElementById("dial-forward");

      dialPrev.addEventListener("click", () => {
        animateDial(dialPrev, -38);
        stepChannel(-1);
      });

      dialNext.addEventListener("click", () => {
        animateDial(dialNext, 38);
        stepChannel(1);
      });

      dialPlay.addEventListener("click", () => {
        animateDial(dialPlay, 32);
        if (player.playing) {
          player.pause();
          showOSD("PAUSE");
        } else {
          player.play();
          showOSD("PLAY");
        }
      });

      dialRewind.addEventListener("click", () => {
        animateDial(dialRewind, -24);
        player.currentTime = Math.max(0, player.currentTime - 10);
        showOSD("REWIND 10s");
      });

      dialForward.addEventListener("click", () => {
        animateDial(dialForward, 24);
        const duration = Number.isFinite(player.duration) ? player.duration : 0;
        player.currentTime = Math.min(duration || player.currentTime + 10, player.currentTime + 10);
        showOSD("FORWARD 10s");
      });

      dialMute.addEventListener("click", () => {
        animateDial(dialMute, 26);
        player.muted = !player.muted;
        dialMute.classList.toggle("is-active", player.muted);
        showOSD(player.muted ? "MUTE" : "UNMUTE");
      });

      document.addEventListener("keydown", (event) => {
        if (event.defaultPrevented) {
          return;
        }
        if (channelMenuVisible) {
          return;
        }
        if (event.target instanceof HTMLElement && /input|textarea|select/i.test(event.target.tagName)) {
          return;
        }

        if (event.key === "ArrowRight") {
          event.preventDefault();
          dialNext.click();
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          dialPrev.click();
        } else if (event.key === " " || event.key === "k") {
          event.preventDefault();
          dialPlay.click();
        } else if (event.key.toLowerCase() === "j") {
          event.preventDefault();
          dialRewind.click();
        } else if (event.key.toLowerCase() === "l") {
          event.preventDefault();
          dialForward.click();
        } else if (event.key.toLowerCase() === "m") {
          event.preventDefault();
          dialMute.click();
        }
      });

      player.on("play", () => {
        dialPlay.classList.add("is-active");
        playIcon.style.display = "none";
        pauseIcon.style.display = "block";
      });

      player.on("pause", () => {
        dialPlay.classList.remove("is-active");
        playIcon.style.display = "block";
        pauseIcon.style.display = "none";
      });
    }

    function initPlayer() {
      const videoElement = document.getElementById(PLAYER_ID);
      player = new Plyr(videoElement, {
        controls: [],
        ratio: "4:3",
        clickToPlay: false
      });

      videoElement.addEventListener("error", () => {
        const currentVideo = videos.find((video) => video.id === currentId);
        if (!currentVideo || fallbackAttempted) {
          return;
        }
        fallbackAttempted = true;
        videoElement.src = getUppercaseSource(currentVideo.src);
        videoElement.play().catch(() => {});
      });

      player.on("ended", () => {
        if (!videos.length) {
          return;
        }
        stepChannel(1);
      });
    }

    async function init() {
      await loadData();
      initPlayer();
      setupChannelMenu();
      setupDials();
      renderChannelMenu();

      if (videos.length) {
        loadVideo(videos[0].id);
      } else {
        showOSD("NO MEDIA");
      }
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
