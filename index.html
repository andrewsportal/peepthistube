<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    body { margin:0; background:#000; color:#f5f5f7; font-family:-apple-system, BlinkMacSystemFont, sans-serif; }
    .player-wrapper { background:#000; padding:16px; }
    .player-container { background:#000; border-radius:16px; overflow:hidden; }
    .playlist-section { padding:24px 16px; }
    .playlist-section h2 { font-size:1.1rem; margin:0 0 16px; }
    .video-row { display:flex; gap:14px; overflow-x:auto; padding-bottom:8px; }
    .video-card {
      min-width:200px; background:#1c1c1e; border-radius:14px;
      padding:18px 20px; cursor:pointer; border:1px solid #2c2c2e;
    }
    .video-card.active { border-color:#0a84ff; }
    .video-number { font-size:0.75rem; color:#8e8e93; margin-bottom:6px; }
    .video-title { font-size:1.05rem; font-weight:500; }
  </style>
</head>
<body>
  <div class="player-wrapper">
    <div class="player-container">
      <video id="player" playsinline></video>
    </div>
  </div>

  <div class="playlist-section">
    <h2>Playlist</h2>
    <div class="video-row" id="videoRow"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    let videos = [];
    let player;
    let currentId = null;

    async function loadData() {
      let titles = [];
      try {
        const res = await fetch('titles.txt');
        if (res.ok) titles = (await res.text()).split('\n').map(l => l.trim()).filter(Boolean);
      } catch (e) {}

      const count = titles.length;
      for (let i = 1; i <= count; i++) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }
    }

    function initPlayer() {
      const videoEl = document.getElementById('player');
      player = new Plyr(videoEl, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
      });

      // Smart fallback: try .MP4 if .mp4 fails
      videoEl.addEventListener('error', () => {
        const currentSrc = videoEl.src;
        if (currentSrc.endsWith('.mp4') && !currentSrc.endsWith('.MP4')) {
          const newSrc = currentSrc.replace('.mp4', '.MP4');
          console.log('Trying uppercase:', newSrc);
          videoEl.src = newSrc;
          videoEl.play().catch(() => {});
        } else {
          console.log('Both .mp4 and .MP4 failed for:', currentSrc);
        }
      });

      player.on('ended', () => {
        const idx = videos.findIndex(v => v.id === currentId);
        if (idx !== -1) loadVideo(videos[(idx + 1) % videos.length].id);
      });
    }

    function renderPlaylist() {
      const row = document.getElementById('videoRow');
      row.innerHTML = '';
      videos.forEach(v => {
        const card = document.createElement('div');
        card.className = `video-card ${v.id === currentId ? 'active' : ''}`;
        card.innerHTML = `
          <div class="video-number">#${v.id}</div>
          <div class="video-title">${v.title}</div>
        `;
        card.onclick = () => loadVideo(v.id);
        row.appendChild(card);
      });
    }

    function loadVideo(id) {
      const video = videos.find(v => v.id === id);
      if (!video) return;

      const videoEl = document.getElementById('player');
      currentId = id;

      videoEl.src = video.src;           // Try lowercase first
      renderPlaylist();
      videoEl.play().catch(() => {});
    }

    async function init() {
      await loadData();
      initPlayer();
      renderPlaylist();

      if (videos.length > 0) {
        loadVideo(videos[0].id);
      }
    }

    window.onload = init;
  </script>
</body>
</html>
