<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Peep This Tube — Minimal Theater</title>
  <style>
    :root {
      color-scheme: dark;
      --text: rgba(245, 249, 255, 0.95);
      --text-soft: rgba(200, 215, 240, 0.82);
      --text-muted: rgba(170, 190, 220, 0.72);
      --line: rgba(210, 225, 250, 0.22);
      --accent: #0a84ff;
      --focus: rgba(10, 132, 255, 0.48);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --t: 220ms var(--ease);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      background: #000;
      isolation: isolate;
    }

    @supports (height: 100dvh) {
      .app {
        min-height: 100dvh;
      }
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.75) 0%, transparent 24%, transparent 70%, rgba(0, 0, 0, 0.82) 100%),
        radial-gradient(120% 90% at 50% 50%, transparent 56%, rgba(0, 0, 0, 0.2) 100%);
    }

    .ui {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      padding:
        calc(10px + env(safe-area-inset-top, 0px))
        max(10px, env(safe-area-inset-right, 0px))
        calc(12px + env(safe-area-inset-bottom, 0px))
        max(10px, env(safe-area-inset-left, 0px));
      transition: opacity var(--t), transform var(--t);
    }

    .app.is-ui-hidden .ui {
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
    }

    .top-zone,
    .bottom-zone {
      pointer-events: auto;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .meta {
      min-width: 0;
    }

    .channel {
      margin: 0 0 2px;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 620;
    }

    .title {
      margin: 0;
      font-size: clamp(0.9rem, 1.6vw, 1.05rem);
      line-height: 1.24;
      font-weight: 620;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(58vw, 620px);
    }

    .credit {
      margin: 3px 0 0;
      font-size: 0.63rem;
      line-height: 1.2;
      letter-spacing: 0.045em;
      font-weight: 540;
      color: rgba(166, 186, 214, 0.56);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(58vw, 620px);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .ghost-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      min-height: 44px;
      min-width: 44px;
      padding: 0 10px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: color var(--t), background-color var(--t), transform var(--t);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .ghost-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }

    .ghost-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .ghost-btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--focus);
      color: #fff;
    }

    .playlist-section {
      margin-top: 8px;
      max-height: 0;
      opacity: 0;
      transform: translateX(14px);
      overflow: hidden;
      pointer-events: none;
      transition: max-height var(--t), opacity var(--t), transform var(--t);
    }

    .app.is-playlist-open .playlist-section {
      max-height: 88px;
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .playlist-rail {
      display: flex;
      align-items: stretch;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
    }

    .playlist-rail::-webkit-scrollbar {
      height: 6px;
    }

    .playlist-rail::-webkit-scrollbar-thumb {
      background: rgba(204, 220, 247, 0.22);
      border-radius: 999px;
    }

    .playlist-item {
      appearance: none;
      border: 1px solid rgba(210, 225, 250, 0.16);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 12px;
      min-height: 48px;
      min-width: min(280px, 78vw);
      max-width: min(360px, 86vw);
      padding: 8px 10px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      transition: all var(--t);
      scroll-snap-align: start;
    }

    .playlist-item:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--line);
      transform: translateY(-1px);
    }

    .playlist-item:focus-visible {
      outline: none;
      border-color: rgba(10, 132, 255, 0.6);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .playlist-item.is-active {
      background: rgba(10, 132, 255, 0.2);
      border-color: rgba(132, 191, 255, 0.48);
    }

    .playlist-item-id {
      font-size: 0.64rem;
      font-weight: 620;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .playlist-item-title {
      font-size: 0.85rem;
      font-weight: 610;
      line-height: 1.22;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bottom-zone {
      display: grid;
      gap: 8px;
    }

    .seek-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .time {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-soft);
      font-variant-numeric: tabular-nums;
    }

    .seek {
      width: 100%;
      margin: 0;
      height: 18px;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .seek:focus-visible {
      outline: none;
    }

    .seek::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.3);
    }

    .seek::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -6px;
      border: 0;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.14);
    }

    .seek::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.3);
    }

    .seek::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: 0;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.14);
    }

    .transport-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-wrap: wrap;
    }

    .play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      padding: 0;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(220, 232, 252, 0.24);
    }

    .play-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .play-btn .icon-pause {
      display: none;
    }

    .play-btn.is-playing .icon-play {
      display: none;
    }

    .play-btn.is-playing .icon-pause {
      display: block;
    }

    .osd {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, 18px);
      z-index: 10;
      pointer-events: none;
      border-radius: 999px;
      border: 1px solid rgba(220, 232, 252, 0.2);
      background: rgba(0, 0, 0, 0.58);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 610;
      letter-spacing: 0.04em;
      padding: 8px 14px;
      opacity: 0;
      transition: opacity var(--t), transform var(--t);
      white-space: nowrap;
    }

    .osd.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      border: 0;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .title {
        max-width: 52vw;
        font-size: 0.92rem;
      }

      .channel {
        font-size: 0.62rem;
      }

      .credit {
        font-size: 0.6rem;
        color: rgba(166, 186, 214, 0.5);
        max-width: 52vw;
      }

      .ghost-btn {
        min-height: 42px;
        min-width: 42px;
        padding: 0 9px;
      }

      .playlist-item {
        min-width: 78vw;
      }
    }

    @media (pointer: coarse) {
      .ghost-btn {
        min-height: 48px;
        min-width: 48px;
      }

      .play-btn {
        width: 54px;
        height: 54px;
      }

      .playlist-item {
        min-height: 50px;
      }
    }

    @media (prefers-contrast: more) {
      .ghost-btn,
      .playlist-item {
        color: #fff;
      }

      .playlist-item {
        border-color: rgba(230, 240, 255, 0.45);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app" aria-label="Minimal theater video player">
    <video id="player" preload="metadata" playsinline></video>
    <div class="vignette" aria-hidden="true"></div>

    <div class="ui" id="ui">
      <section class="top-zone">
        <div class="top-row">
          <div class="meta">
            <p class="channel" id="channelLabel">Channel --</p>
            <h1 class="title" id="nowPlayingTitle">Loading playlist...</h1>
            <p class="credit" id="creditLine">Filmed &amp; Edited by: Andrew Rios</p>
          </div>
          <div class="top-actions">
            <button class="ghost-btn" id="playlistToggle" type="button" aria-expanded="false" aria-controls="playlistRail">
              Playlist
            </button>
            <button class="ghost-btn" id="shareBtn" type="button" aria-label="Share current video">
              Share
            </button>
          </div>
        </div>

        <div class="playlist-section" id="playlistSection" aria-hidden="true">
          <div class="playlist-rail" id="playlistRail" role="listbox" aria-label="Video playlist"></div>
        </div>
      </section>

      <section class="bottom-zone">
        <div class="seek-row">
          <span class="time" id="timeCurrent">0:00</span>
          <input class="seek" id="seekBar" type="range" min="0" max="1000" step="1" value="0" aria-label="Seek timeline" />
          <span class="time" id="timeTotal">--:--</span>
        </div>

        <div class="transport-row" aria-label="Playback controls">
          <button class="ghost-btn" id="rewindBtn" type="button" aria-label="Rewind 10 seconds">-10</button>
          <button class="ghost-btn" id="prevBtn" type="button" aria-label="Previous channel">Prev</button>

          <button class="ghost-btn play-btn" id="playBtn" type="button" aria-label="Play video">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <polygon points="8 5 20 12 8 19"></polygon>
            </svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="6" y="5" width="4.5" height="14"></rect>
              <rect x="13.5" y="5" width="4.5" height="14"></rect>
            </svg>
          </button>

          <button class="ghost-btn" id="nextBtn" type="button" aria-label="Next channel">Next</button>
          <button class="ghost-btn" id="forwardBtn" type="button" aria-label="Forward 10 seconds">+10</button>
          <button class="ghost-btn" id="muteBtn" type="button" aria-label="Mute audio">Mute</button>
        </div>
      </section>
    </div>

    <div class="osd" id="osd" aria-live="polite"></div>
    <span class="sr-only" id="liveRegion" aria-live="polite"></span>
  </main>

  <script>
    const TITLE_SOURCE = "titles.txt";
    const PLAYER_ID = "player";

    const videos = [];
    let currentId = null;
    let fallbackAttempted = false;
    let playlistVisible = false;
    let osdTimer = null;
    let hideUiTimer = null;
    let isScrubbing = false;

    const app = document.getElementById("app");
    const player = document.getElementById(PLAYER_ID);

    const playlistToggle = document.getElementById("playlistToggle");
    const shareBtn = document.getElementById("shareBtn");
    const playlistSection = document.getElementById("playlistSection");
    const playlistRail = document.getElementById("playlistRail");

    const channelLabel = document.getElementById("channelLabel");
    const nowPlayingTitle = document.getElementById("nowPlayingTitle");

    const playBtn = document.getElementById("playBtn");
    const rewindBtn = document.getElementById("rewindBtn");
    const forwardBtn = document.getElementById("forwardBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const muteBtn = document.getElementById("muteBtn");

    const seekBar = document.getElementById("seekBar");
    const timeCurrent = document.getElementById("timeCurrent");
    const timeTotal = document.getElementById("timeTotal");

    const osd = document.getElementById("osd");
    const liveRegion = document.getElementById("liveRegion");

    async function loadTitles() {
      try {
        const response = await fetch(TITLE_SOURCE);
        if (!response.ok) return [];
        return (await response.text())
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    async function loadData() {
      const titles = await loadTitles();
      videos.length = 0;

      for (let i = 1; i <= titles.length; i += 1) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }

      if (!videos.length) {
        videos.push({ id: 1, title: "Video 1", src: "video1.mp4" });
      }
    }

    function getUppercaseSource(src) {
      return src.replace(/\.mp4$/i, ".MP4");
    }

    function padChannel(id) {
      return String(id).padStart(2, "0");
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "--:--";
      const total = Math.floor(seconds);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showOSD(text, duration = 1300) {
      osd.textContent = text;
      liveRegion.textContent = text;
      osd.classList.add("is-visible");
      clearTimeout(osdTimer);
      osdTimer = setTimeout(() => {
        osd.classList.remove("is-visible");
      }, duration);
    }

    function setPlayButtonState(isPlaying) {
      playBtn.classList.toggle("is-playing", isPlaying);
      playBtn.setAttribute("aria-label", isPlaying ? "Pause video" : "Play video");
    }

    function updateMuteButton() {
      const muted = player.muted;
      muteBtn.textContent = muted ? "Unmute" : "Mute";
      muteBtn.setAttribute("aria-label", muted ? "Unmute audio" : "Mute audio");
    }

    function updateNowPlaying(video) {
      channelLabel.textContent = `Channel ${padChannel(video.id)}`;
      nowPlayingTitle.textContent = video.title;
    }

    function updateTimeline() {
      const duration = Number.isFinite(player.duration) ? player.duration : 0;
      const current = Number.isFinite(player.currentTime) ? player.currentTime : 0;
      timeCurrent.textContent = formatTime(current);
      timeTotal.textContent = duration > 0 ? formatTime(duration) : "--:--";

      if (!isScrubbing) {
        seekBar.value = duration > 0 ? String(Math.round((current / duration) * 1000)) : "0";
      }
    }

    function getCurrentIndex() {
      return videos.findIndex((video) => video.id === currentId);
    }

    function getCurrentVideo() {
      return videos.find((video) => video.id === currentId) || null;
    }

    function buildVideoPageUrl(video) {
      const url = new URL(window.location.href);
      url.searchParams.set("v", String(video.id));
      return url.toString();
    }

    function buildDirectVideoUrl(video) {
      return new URL(video.src, window.location.href).toString();
    }

    function getInitialVideoIdFromUrl() {
      const raw = new URLSearchParams(window.location.search).get("v");
      const parsed = Number.parseInt(raw, 10);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
    }

    async function copyTextFallback(text) {
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
          /* continue fallback */
        }
      }

      try {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "fixed";
        textArea.style.opacity = "0";
        textArea.style.pointerEvents = "none";
        document.body.appendChild(textArea);
        textArea.select();
        textArea.setSelectionRange(0, text.length);
        const copied = document.execCommand("copy");
        document.body.removeChild(textArea);
        return copied;
      } catch (error) {
        return false;
      }
    }

    async function shareCurrentVideo() {
      const video = getCurrentVideo();
      if (!video) {
        showOSD("NO VIDEO", 900);
        return;
      }

      const pageUrl = buildVideoPageUrl(video);
      const directUrl = buildDirectVideoUrl(video);

      const shareData = {
        title: video.title,
        text: `${video.title}\n${directUrl}`,
        url: pageUrl
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
          showOSD("SHARED", 900);
          return;
        }

        const copied = await copyTextFallback(`${video.title}\n${pageUrl}\n${directUrl}`);
        showOSD(copied ? "LINK COPIED" : "SHARE NOT AVAILABLE", 1100);
      } catch (error) {
        if (error && error.name === "AbortError") {
          showOSD("SHARE CANCELED", 900);
          return;
        }
        const copied = await copyTextFallback(`${video.title}\n${pageUrl}\n${directUrl}`);
        showOSD(copied ? "LINK COPIED" : "SHARE FAILED", 1100);
      }
    }

    function syncUrlForVideo(id) {
      try {
        const url = new URL(window.location.href);
        url.searchParams.set("v", String(id));
        history.replaceState({ v: id }, "", url);
      } catch (error) {
        /* no-op */
      }
    }

    function getPlaylistItems() {
      return Array.from(playlistRail.querySelectorAll(".playlist-item"));
    }

    function focusPlaylistItem(index) {
      const items = getPlaylistItems();
      if (!items.length) return;
      const safe = ((index % items.length) + items.length) % items.length;

      items.forEach((item, i) => {
        item.tabIndex = i === safe ? 0 : -1;
      });

      items[safe].focus({ preventScroll: true });
      items[safe].scrollIntoView({ behavior: "smooth", inline: "nearest", block: "nearest" });
    }

    function renderPlaylist() {
      playlistRail.innerHTML = "";

      videos.forEach((video) => {
        const item = document.createElement("button");
        item.type = "button";
        item.id = `playlist-item-${video.id}`;
        item.className = "playlist-item";
        item.setAttribute("role", "option");
        item.setAttribute("aria-selected", String(video.id === currentId));
        item.tabIndex = -1;

        if (video.id === currentId) item.classList.add("is-active");

        const id = document.createElement("span");
        id.className = "playlist-item-id";
        id.textContent = `CH ${padChannel(video.id)}`;

        const title = document.createElement("span");
        title.className = "playlist-item-title";
        title.textContent = video.title;

        item.append(id, title);

        item.addEventListener("click", () => {
          loadVideo(video.id);
          setPlaylistVisible(false, { returnFocus: true });
        });

        playlistRail.appendChild(item);
      });
    }

    function setPlaylistVisible(visible, { focus = false, returnFocus = false } = {}) {
      playlistVisible = visible;
      app.classList.toggle("is-playlist-open", visible);
      playlistToggle.setAttribute("aria-expanded", String(visible));
      playlistSection.setAttribute("aria-hidden", String(!visible));

      if (visible) {
        renderPlaylist();
        const currentIndex = videos.findIndex((video) => video.id === currentId);
        if (focus) focusPlaylistItem(currentIndex >= 0 ? currentIndex : 0);
        showUi(true);
      } else {
        getPlaylistItems().forEach((item) => {
          item.tabIndex = -1;
        });
        if (returnFocus) playlistToggle.focus();
        hideUiAfterDelay();
      }
    }

    async function safePlay(showHint = true) {
      try {
        await player.play();
        return true;
      } catch (error) {
        if (showHint) showOSD("TAP PLAY");
        return false;
      }
    }

    async function loadVideo(id) {
      const selected = videos.find((video) => video.id === id);
      if (!selected) return;

      currentId = id;
      syncUrlForVideo(id);
      fallbackAttempted = false;
      player.src = selected.src;

      updateNowPlaying(selected);
      renderPlaylist();

      showOSD(`CH ${padChannel(selected.id)} • ${selected.title.toUpperCase()}`);
      await safePlay(true);
    }

    function stepChannel(step) {
      if (!videos.length) return;
      const currentIndex = getCurrentIndex();
      const safeIndex = currentIndex >= 0 ? currentIndex : 0;
      const nextIndex = (safeIndex + step + videos.length) % videos.length;
      loadVideo(videos[nextIndex].id);
    }

    function showUi(lock = false) {
      app.classList.remove("is-ui-hidden");
      clearTimeout(hideUiTimer);
      if (!lock) hideUiAfterDelay();
    }

    function hideUiAfterDelay() {
      clearTimeout(hideUiTimer);
      if (player.paused || playlistVisible || isScrubbing) return;
      hideUiTimer = setTimeout(() => {
        app.classList.add("is-ui-hidden");
      }, 2000);
    }

    function isEditingTarget(target) {
      if (!(target instanceof HTMLElement)) return false;
      return /input|textarea|select/i.test(target.tagName);
    }

    function handlePlaylistKeys(event) {
      if (!playlistVisible) return false;
      const items = getPlaylistItems();
      if (!items.length) return false;

      const currentIndex = items.findIndex((item) => item === document.activeElement);
      const safeCurrent = currentIndex >= 0 ? currentIndex : 0;

      if (event.key === "ArrowRight") {
        event.preventDefault();
        focusPlaylistItem(safeCurrent + 1);
        return true;
      }

      if (event.key === "ArrowLeft") {
        event.preventDefault();
        focusPlaylistItem(safeCurrent - 1);
        return true;
      }

      if (event.key === "Home") {
        event.preventDefault();
        focusPlaylistItem(0);
        return true;
      }

      if (event.key === "End") {
        event.preventDefault();
        focusPlaylistItem(items.length - 1);
        return true;
      }

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        items[safeCurrent].click();
        return true;
      }

      if (event.key === "Escape") {
        event.preventDefault();
        setPlaylistVisible(false, { returnFocus: true });
        return true;
      }

      return false;
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    async function requestFullscreen() {
      const root = document.documentElement;
      const fn = root.requestFullscreen || root.webkitRequestFullscreen;
      if (!fn) return false;
      try {
        const result = fn.call(root);
        if (result && typeof result.then === "function") await result;
        return true;
      } catch (error) {
        return false;
      }
    }

    async function exitFullscreen() {
      const fn = document.exitFullscreen || document.webkitExitFullscreen;
      if (!fn) return false;
      try {
        const result = fn.call(document);
        if (result && typeof result.then === "function") await result;
        return true;
      } catch (error) {
        return false;
      }
    }

    async function toggleFullscreen() {
      if (getFullscreenElement()) {
        await exitFullscreen();
      } else {
        const ok = await requestFullscreen();
        if (!ok && typeof player.webkitEnterFullscreen === "function") {
          try {
            player.webkitEnterFullscreen();
          } catch (error) {
            /* no-op */
          }
        }
      }
    }

    function armFullscreenOnGesture() {
      const once = async () => {
        await requestFullscreen();
      };
      window.addEventListener("pointerdown", once, { once: true });
      window.addEventListener("keydown", once, { once: true });
    }

    function bindEvents() {
      playBtn.addEventListener("click", async () => {
        showUi(true);
        if (player.paused) {
          const ok = await safePlay(true);
          if (ok) showOSD("PLAY", 700);
        } else {
          player.pause();
          showOSD("PAUSE", 700);
        }
      });

      rewindBtn.addEventListener("click", () => {
        showUi(true);
        player.currentTime = Math.max(0, (player.currentTime || 0) - 10);
        showOSD("REWIND 10s", 900);
      });

      forwardBtn.addEventListener("click", () => {
        showUi(true);
        const duration = Number.isFinite(player.duration) ? player.duration : player.currentTime + 10;
        player.currentTime = Math.min(duration, (player.currentTime || 0) + 10);
        showOSD("FORWARD 10s", 900);
      });

      prevBtn.addEventListener("click", () => {
        showUi(true);
        stepChannel(-1);
      });

      nextBtn.addEventListener("click", () => {
        showUi(true);
        stepChannel(1);
      });

      muteBtn.addEventListener("click", () => {
        showUi(true);
        player.muted = !player.muted;
        updateMuteButton();
        showOSD(player.muted ? "MUTE" : "UNMUTE", 800);
      });

      playlistToggle.addEventListener("click", () => {
        setPlaylistVisible(!playlistVisible, { focus: !playlistVisible });
      });

      shareBtn.addEventListener("click", async () => {
        showUi(true);
        await shareCurrentVideo();
      });

      seekBar.addEventListener("pointerdown", () => {
        isScrubbing = true;
        showUi(true);
      });

      document.addEventListener("pointerup", () => {
        if (!isScrubbing) return;
        isScrubbing = false;
        hideUiAfterDelay();
      });

      seekBar.addEventListener("input", () => {
        const duration = Number.isFinite(player.duration) ? player.duration : 0;
        if (duration > 0) {
          player.currentTime = (Number(seekBar.value) / 1000) * duration;
        }
        updateTimeline();
        showUi(true);
      });

      document.addEventListener("pointerdown", (event) => {
        if (!playlistVisible) return;
        if (!(event.target instanceof Node)) return;
        if (playlistSection.contains(event.target) || playlistToggle.contains(event.target)) return;
        setPlaylistVisible(false);
      });

      app.addEventListener("pointermove", () => showUi());
      app.addEventListener("pointerdown", () => showUi());

      player.addEventListener("play", () => {
        setPlayButtonState(true);
        hideUiAfterDelay();
      });

      player.addEventListener("pause", () => {
        setPlayButtonState(false);
        showUi(true);
      });

      player.addEventListener("timeupdate", updateTimeline);
      player.addEventListener("durationchange", updateTimeline);
      player.addEventListener("loadedmetadata", updateTimeline);

      player.addEventListener("volumechange", updateMuteButton);

      player.addEventListener("ended", () => {
        stepChannel(1);
      });

      player.addEventListener("error", async () => {
        const currentVideo = videos.find((video) => video.id === currentId);
        if (!currentVideo || fallbackAttempted) return;
        fallbackAttempted = true;
        player.src = getUppercaseSource(currentVideo.src);
        await safePlay(false);
      });

      document.addEventListener("keydown", async (event) => {
        showUi();

        if (handlePlaylistKeys(event)) return;
        if (isEditingTarget(event.target)) return;

        if (event.key === "Escape" && playlistVisible) {
          event.preventDefault();
          setPlaylistVisible(false, { returnFocus: true });
          return;
        }

        if (event.key === "ArrowRight" || event.key.toLowerCase() === "l") {
          event.preventDefault();
          forwardBtn.click();
        } else if (event.key === "ArrowLeft" || event.key.toLowerCase() === "j") {
          event.preventDefault();
          rewindBtn.click();
        } else if (event.key === " " || event.key.toLowerCase() === "k") {
          event.preventDefault();
          playBtn.click();
        } else if (event.key.toLowerCase() === "m") {
          event.preventDefault();
          muteBtn.click();
        } else if (event.key.toLowerCase() === "n") {
          event.preventDefault();
          nextBtn.click();
        } else if (event.key.toLowerCase() === "p") {
          event.preventDefault();
          prevBtn.click();
        } else if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          await toggleFullscreen();
        } else if (event.key.toLowerCase() === "c") {
          event.preventDefault();
          setPlaylistVisible(!playlistVisible, { focus: !playlistVisible });
        } else if (event.key.toLowerCase() === "s") {
          event.preventDefault();
          await shareCurrentVideo();
        }
      });
    }

    async function init() {
      await loadData();
      bindEvents();
      renderPlaylist();
      updateMuteButton();
      setPlayButtonState(false);

      const initialId = getInitialVideoIdFromUrl();
      const validInitialId =
        initialId && videos.some((video) => video.id === initialId)
          ? initialId
          : videos[0]?.id;

      if (validInitialId) {
        await loadVideo(validInitialId);
      } else {
        showOSD("NO MEDIA");
      }

      const full = await requestFullscreen();
      if (!full) armFullscreenOnGesture();
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
