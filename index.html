<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --accent: #0a84ff;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 24px 16px;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      text-align: center;
      margin: 0 0 28px;
      letter-spacing: -0.02em;
    }
    .player-container {
      background: #111;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .current-title {
      font-size: 1.15rem;
      font-weight: 500;
    }
    .lock-btn {
      background: #222;
      color: #ddd;
      border: none;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .playlist {
      margin-top: 8px;
    }
    .playlist h2 {
      font-size: 1rem;
      font-weight: 500;
      margin: 0 0 14px;
      color: #aaa;
    }
    .video-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 16px;
      scroll-snap-type: x mandatory;
    }
    .video-card {
      min-width: 200px;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px 22px;
      cursor: pointer;
      scroll-snap-align: start;
      border: 1px solid #222;
      transition: all 0.2s ease;
    }
    .video-card.active {
      border-color: var(--accent);
      background: #222;
    }
    .video-number {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 6px;
    }
    .video-title {
      font-size: 1.1rem;
      font-weight: 500;
      line-height: 1.3;
    }
    @media (max-width: 480px) {
      .video-card { min-width: 170px; padding: 18px 20px; }
    }
  </style>
</head>
<body>
  <h1>Video Hub</h1>

  <!-- Player -->
  <div class="player-container">
    <div class="player-header">
      <div class="current-title" id="currentTitle">Select a video</div>
      <button class="lock-btn" onclick="toggleLock()">
        <span id="lockIcon">🔓</span>
        <span id="lockText">Lock</span>
      </button>
    </div>
    <video id="player" playsinline></video>
  </div>

  <!-- Playlist -->
  <div class="playlist">
    <h2>Playlist</h2>
    <div class="video-row" id="videoRow"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    let videos = [];
    let player;
    let currentId = null;
    let locked = false;

    async function loadData() {
      let titles = [];
      try {
        const res = await fetch('titles.txt');
        if (res.ok) titles = (await res.text()).split('\n').map(l => l.trim()).filter(Boolean);
      } catch (e) {}

      const count = titles.length || 4;
      for (let i = 1; i <= count; i++) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }
    }

    function initPlayer() {
      const videoEl = document.getElementById('player');
      player = new Plyr(videoEl, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
      });

      player.on('ended', () => {
        const idx = videos.findIndex(v => v.id === currentId);
        loadVideo(videos[(idx + 1) % videos.length].id);
      });
    }

    function renderPlaylist() {
      const row = document.getElementById('videoRow');
      row.innerHTML = '';
      videos.forEach(v => {
        const card = document.createElement('div');
        card.className = `video-card ${v.id === currentId ? 'active' : ''}`;
        card.innerHTML = `
          <div class="video-number">#${v.id}</div>
          <div class="video-title">${v.title}</div>
        `;
        card.onclick = () => loadVideo(v.id);
        row.appendChild(card);
      });
    }

    function loadVideo(id) {
      const video = videos.find(v => v.id === id);
      if (!video) return;

      const videoEl = document.getElementById('player');
      document.getElementById('currentTitle').textContent = video.title;
      currentId = id;

      videoEl.src = video.src;
      renderPlaylist();
      videoEl.play().catch(() => {});
    }

    async function toggleLock() {
      const icon = document.getElementById('lockIcon');
      const text = document.getElementById('lockText');
      const btn = icon.parentElement;

      if (!screen.orientation?.lock) return alert("Not supported");

      try {
        if (!locked) {
          await screen.orientation.lock('landscape');
          locked = true;
          btn.style.background = '#1e3a8a';
          icon.textContent = '🔒';
          text.textContent = 'Unlock';
        } else {
          await screen.orientation.unlock();
          locked = false;
          btn.style.background = '#222';
          icon.textContent = '🔓';
          text.textContent = 'Lock';
        }
      } catch (e) {}
    }

    async function init() {
      await loadData();
      initPlayer();
      renderPlaylist();
    }

    window.onload = init;
  </script>
</body>
</html>
