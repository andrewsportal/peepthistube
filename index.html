<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Video Hub</title>
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { text-align: center; margin-bottom: 10px; }
    .player-container {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .current-title {
      font-size: 1.3rem;
      margin: 10px 0 15px;
      text-align: center;
      color: #fff;
    }
    .playlist {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 15px;
    }
    .playlist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .video-item {
      background: #222;
      border: none;
      color: #eee;
      padding: 14px 18px;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .video-item:hover {
      background: #333;
    }
    .video-item.active {
      background: #444;
      border-left: 4px solid #4ade80;
    }
    .toggle-btn {
      background: #333;
      color: #eee;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .toggle-btn:hover { background: #555; }
    @media (max-width: 600px) {
      body { padding: 10px; }
    }
  </style>
</head>
<body>
  <h1>🎬 My Video Hub</h1>
  <p style="text-align:center; color:#888;">Click any title below to play</p>

  <!-- Main Player -->
  <div class="player-container">
    <div class="current-title" id="currentTitle">Select a video to start</div>
    
    <video id="player" playsinline controls>
      <!-- Default video will be set by JS -->
    </video>
  </div>

  <!-- Playlist -->
  <div class="playlist" id="playlist">
    <div class="playlist-header">
      <h2 style="margin:0;">Playlist</h2>
      <button class="toggle-btn" onclick="togglePlaylist()">Hide Playlist</button>
    </div>
    
    <div class="video-list" id="videoList">
      <!-- Populated by JavaScript -->
    </div>
  </div>

  <p style="text-align:center; color:#666; font-size:0.9rem; margin-top:30px;">
    Hosted on GitHub Pages • Replace the video sources below with your own files or URLs
  </p>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  
  <script>
    // === YOUR VIDEOS - EDIT THIS ARRAY ===
    const videos = [
      {
        id: 1,
        title: "Intro Video - Welcome",
        src: "https://cdn.plyr.io/static/demo/View_From_A_Blue_Moon_Trailer-576p.mp4", // ← Replace with your video
        poster: "" // optional poster image URL
      },
      {
        id: 2,
        title: "Tutorial Part 1",
        src: "https://cdn.plyr.io/static/demo/View_From_A_Blue_Moon_Trailer-576p.mp4", // ← Replace
        poster: ""
      },
      {
        id: 3,
        title: "Demo Walkthrough",
        src: "https://cdn.plyr.io/static/demo/View_From_A_Blue_Moon_Trailer-576p.mp4", // ← Replace
        poster: ""
      }
      // Add as many as you want
    ];

    let player;
    let currentVideoId = null;

    function initPlayer() {
      const videoElement = document.getElementById('player');
      
      // Initialize Plyr
      player = new Plyr(videoElement, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
        settings: ['quality', 'speed'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
      });

      // Optional: Auto-play next video when one ends
      player.on('ended', () => {
        playNextVideo();
      });
    }

    function renderPlaylist() {
      const listContainer = document.getElementById('videoList');
      listContainer.innerHTML = '';

      videos.forEach(video => {
        const btn = document.createElement('button');
        btn.className = 'video-item';
        btn.textContent = video.title;
        btn.onclick = () => loadVideo(video.id);
        btn.dataset.id = video.id;
        
        if (video.id === currentVideoId) {
          btn.classList.add('active');
        }
        
        listContainer.appendChild(btn);
      });
    }

    function loadVideo(videoId) {
      const video = videos.find(v => v.id === videoId);
      if (!video) return;

      const videoEl = document.getElementById('player');
      const titleEl = document.getElementById('currentTitle');

      // Update source
      videoEl.src = video.src;
      if (video.poster) videoEl.poster = video.poster;

      // Update UI
      titleEl.textContent = video.title;
      currentVideoId = videoId;

      // Re-render playlist to highlight active item
      renderPlaylist();

      // Play the video
      videoEl.play().catch(() => {
        // Autoplay might be blocked - user can click play
      });

      // Optional: Hide playlist after starting (uncomment if you want this behavior)
      // document.getElementById('playlist').style.display = 'none';
    }

    function playNextVideo() {
      if (!currentVideoId) return;
      
      const currentIndex = videos.findIndex(v => v.id === currentVideoId);
      const nextIndex = (currentIndex + 1) % videos.length;
      loadVideo(videos[nextIndex].id);
    }

    function togglePlaylist() {
      const playlist = document.getElementById('playlist');
      const btns = document.querySelectorAll('.toggle-btn');
      
      if (playlist.style.display === 'none') {
        playlist.style.display = 'block';
        btns.forEach(b => b.textContent = 'Hide Playlist');
      } else {
        playlist.style.display = 'none';
        btns.forEach(b => b.textContent = 'Show Playlist');
      }
    }

    // Initialize everything
    function init() {
      initPlayer();
      renderPlaylist();
      
      // Auto-load the first video (optional)
      // loadVideo(videos[0].id);
      
      // Keyboard hint
      console.log('%c[Video Hub] Tip: Press "H" to toggle playlist visibility', 'color:#666');
    }

    // Bonus: Press "H" key to toggle playlist
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'h') {
        togglePlaylist();
      }
    });

    window.onload = init;
  </script>
</body>
</html>
