<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --accent: #E27A00;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px 16px 40px;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
      -webkit-font-smoothing: antialiased;
    }
    .player-wrapper {
      background: #000000;
      padding: 0 0 24px;
    }
    .player-container {
      background: #000000;
      overflow: hidden;
    }
    /* Force pure black on the actual video element */
    #player {
      background: #000000 !important;
      display: block;
    }
    .playlist-section {
      padding-top: 16px;
    }
    .playlist-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 16px;
      color: #f5f5f7;
    }
    .video-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .video-card {
      min-width: 200px;
      background: #1c1c1e;
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      scroll-snap-align: start;
      border: 1px solid #2c2c2e;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .video-card:active {
      transform: scale(0.985);
    }
    .video-card.active {
      border-color: var(--accent);
      background: #2c2c2e;
    }
    .video-number {
      font-size: 0.75rem;
      color: #8e8e93;
      margin-bottom: 6px;
    }
    .video-title {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.35;
      color: #f5f5f7;
    }
    @media (max-width: 480px) {
      .video-card { min-width: 170px; padding: 16px 18px; }
      body { padding: 16px 12px 32px; }
    }
  </style>
</head>
<body>
  <!-- Video Player -->
  <div class="player-wrapper">
    <div class="player-container">
      <video id="player" playsinline></video>
    </div>
  </div>

  <!-- Playlist -->
  <div class="playlist-section">
    <h2>Playlist</h2>
    <div class="video-row" id="videoRow"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    let videos = [];
    let player;
    let currentId = null;

    async function loadData() {
      let titles = [];
      try {
        const res = await fetch('titles.txt');
        if (res.ok) titles = (await res.text()).split('\n').map(l => l.trim()).filter(Boolean);
      } catch (e) {}

      const count = titles.length;
      for (let i = 1; i <= count; i++) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }
    }

    function initPlayer() {
      const videoEl = document.getElementById('player');
      player = new Plyr(videoEl, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
      });

      // Fallback for .mp4 vs .MP4
      videoEl.addEventListener('error', () => {
        const currentSrc = videoEl.src;
        if (currentSrc.endsWith('.mp4') && !currentSrc.endsWith('.MP4')) {
          videoEl.src = currentSrc.replace('.mp4', '.MP4');
          videoEl.play().catch(() => {});
        }
      });

      player.on('ended', () => {
        const idx = videos.findIndex(v => v.id === currentId);
        if (idx !== -1) loadVideo(videos[(idx + 1) % videos.length].id);
      });
    }

    function renderPlaylist() {
      const row = document.getElementById('videoRow');
      row.innerHTML = '';
      videos.forEach(v => {
        const card = document.createElement('div');
        card.className = `video-card ${v.id === currentId ? 'active' : ''}`;
        card.innerHTML = `
          <div class="video-number">#${v.id}</div>
          <div class="video-title">${v.title}</div>
        `;
        card.onclick = () => loadVideo(v.id);
        row.appendChild(card);
      });
    }

    function loadVideo(id) {
      const video = videos.find(v => v.id === id);
      if (!video) return;

      const videoEl = document.getElementById('player');
      currentId = id;

      videoEl.src = video.src;
      renderPlaylist();
      videoEl.play().catch(() => {});
    }

    async function init() {
      await loadData();
      initPlayer();
      renderPlaylist();

      if (videos.length > 0) {
        loadVideo(videos[0].id);
      }
    }

    window.onload = init;
  </script>
</body>
</html>
