<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunset House Mixtapes</title>
  <meta
    name="description"
    content="A minimal, Apple-inspired mixtape portal with a cinematic looping beach-deck atmosphere and lightweight background playback."
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#111111",
            surface: "#1C1C1E",
            cream: "#FFF8F0",
            coral: "#E85D04",
            gold: "#FFB703",
          },
        },
      },
    };
  </script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      color: #fff8f0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .portal-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      filter: saturate(1.05) contrast(1.02);
    }

    .portal-overlay {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 183, 3, 0.14), transparent 42%),
        linear-gradient(to bottom, rgba(17, 17, 17, 0.28), rgba(17, 17, 17, 0.82));
    }

    .glass-card {
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      background: rgba(22, 22, 24, 0.62);
      border: 1px solid rgba(255, 248, 240, 0.1);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .mix-pill {
      border-radius: 1rem;
      border: 1px solid rgba(255, 248, 240, 0.12);
      background: rgba(255, 248, 240, 0.03);
      transition:
        transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
        background 220ms ease,
        border-color 220ms ease;
    }

    .mix-pill:hover {
      transform: translateY(-2px);
      background: rgba(255, 248, 240, 0.08);
    }

    .mix-pill.active {
      border-color: rgba(255, 183, 3, 0.55);
      background: rgba(255, 183, 3, 0.13);
      box-shadow: 0 0 0 1px rgba(255, 183, 3, 0.32);
    }

    .plaque-shell {
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 0.85rem;
      padding: 2px;
      background: linear-gradient(145deg, rgba(255, 183, 3, 0.95), rgba(232, 93, 4, 0.58));
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      flex-shrink: 0;
    }

    .plaque-core {
      width: 100%;
      height: 100%;
      border-radius: 0.72rem;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 220, 130, 0.9), rgba(186, 123, 26, 0.9) 48%, rgba(86, 53, 10, 0.95) 100%);
    }

    .plaque-core::before {
      content: "";
      position: absolute;
      inset: 20%;
      border-radius: 999px;
      border: 1px solid rgba(255, 248, 240, 0.45);
      pointer-events: none;
    }

    .plaque-core img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.9;
      mix-blend-mode: soft-light;
    }

    .soft-btn {
      border: none;
      cursor: pointer;
      transition:
        transform 300ms cubic-bezier(0.22, 1, 0.36, 1),
        color 180ms ease,
        background 180ms ease;
    }

    .soft-btn:hover {
      transform: scale(1.06);
    }

    .soft-btn:active {
      transform: scale(0.95);
    }

    .progress {
      height: 4px;
      border-radius: 999px;
      position: relative;
      background: rgba(255, 248, 240, 0.2);
      cursor: pointer;
      transition: height 180ms ease;
    }

    .progress:hover,
    .progress:focus-visible {
      height: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      width: 0%;
      background: linear-gradient(90deg, #e85d04, #ffb703);
    }

    .progress-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%) scale(0);
      background: #fff8f0;
      transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .progress:hover .progress-thumb,
    .progress:focus-visible .progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    .tabular {
      font-variant-numeric: tabular-nums;
    }

    .tracklist-shell {
      max-height: min(29svh, 280px);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 248, 240, 0.2) transparent;
    }

    .tracklist-shell::-webkit-scrollbar {
      width: 8px;
    }

    .tracklist-shell::-webkit-scrollbar-thumb {
      background: rgba(255, 248, 240, 0.2);
      border-radius: 999px;
    }

    .top-copy {
      letter-spacing: 0.22em;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <video
    id="portalVideo"
    class="portal-video"
    autoplay
    muted
    loop
    playsinline
    preload="metadata"
    poster="hero-poster.jpg"
    aria-hidden="true"
  >
    <source id="portalVideoSource" src="sunset-dance-loop.mp4" type="video/mp4" />
  </video>
  <div class="portal-overlay" aria-hidden="true"></div>

  <main class="relative z-10 flex min-h-[100svh] flex-col justify-between">
    <header class="px-5 pt-6 text-center md:px-10 md:pt-8">
      <p id="mixerCreditTop" class="top-copy text-[0.62rem] uppercase text-gold/85 md:text-[0.68rem]">Mixed by Andrew</p>
      <h1 id="headline" class="mt-3 text-[clamp(2.2rem,8vw,4.6rem)] font-semibold leading-[0.95] tracking-[-0.03em] text-cream">
        Palm Deck House
      </h1>
      <p id="subheadline" class="mx-auto mt-3 max-w-[37ch] text-sm leading-relaxed text-cream/72 md:text-[1rem]">
        A portal into the deck: palms, horizon, warm air, and three uninterrupted House journeys.
      </p>
    </header>

    <section class="mx-3 mb-3 rounded-3xl px-4 pb-4 pt-3 glass-card md:mx-8 md:mb-6 md:px-6 md:pb-6 md:pt-5" aria-label="Mixtape controls">
      <div class="mx-auto max-w-5xl">
        <div class="mx-auto h-1 w-10 rounded-full bg-cream/28 md:hidden"></div>

        <div id="mixSelector" class="mt-4 grid grid-cols-3 gap-2 md:gap-3"></div>
        <div id="downloadRow" class="mt-2 flex flex-wrap gap-2"></div>

        <div class="mt-4 grid items-center gap-3 md:grid-cols-[1fr_auto]">
          <div class="flex min-w-0 items-center gap-3">
            <div class="plaque-shell h-[3.1rem] w-[3.1rem] rounded-xl">
              <div class="plaque-core rounded-[0.72rem]">
                <img id="playerArtwork" src="artwork-1.jpg" alt="" />
              </div>
            </div>
            <div class="min-w-0">
              <p id="mixTitle" class="truncate text-[0.95rem] font-medium tracking-[-0.01em] text-cream"></p>
              <p id="mixMood" class="truncate text-[0.74rem] text-cream/62"></p>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <a
              id="downloadCurrentBtn"
              href="#"
              download
              class="soft-btn inline-flex h-11 items-center justify-center rounded-full border border-cream/24 bg-cream/8 px-4 text-[0.68rem] font-medium uppercase tracking-[0.14em] text-cream no-underline"
              aria-label="Download current mixtape"
            >
              Download
            </a>
            <button
              id="playPauseBtn"
              type="button"
              class="soft-btn inline-flex h-11 w-11 items-center justify-center rounded-full bg-cream text-base"
              aria-label="Play"
            >
              <svg id="iconPlay" viewBox="0 0 24 24" class="h-[18px] w-[18px] translate-x-[1px]" fill="#111111" aria-hidden="true">
                <path d="M8 5v14l11-7z"></path>
              </svg>
              <svg id="iconPause" viewBox="0 0 24 24" class="hidden h-[18px] w-[18px]" fill="#111111" aria-hidden="true">
                <path d="M7 5h4v14H7zm6 0h4v14h-4z"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="mt-4 grid grid-cols-[auto_1fr_auto_auto] items-center gap-2">
          <button
            id="rewindBtn"
            type="button"
            class="soft-btn inline-flex h-10 w-10 items-center justify-center rounded-full border border-cream/22 bg-cream/7 text-cream/88"
            aria-label="Rewind 10 seconds"
          >
            <svg viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <path d="M12 19a7 7 0 1 1 5.57-11.24"></path>
              <path d="M13 8H9v4"></path>
              <path d="M9 8l5 5"></path>
            </svg>
          </button>

          <div
            id="progressTrack"
            class="progress"
            role="slider"
            tabindex="0"
            aria-label="Playback progress"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <div id="progressFill" class="progress-fill"></div>
            <div id="progressThumb" class="progress-thumb"></div>
          </div>

          <span id="timeEl" class="tabular text-[0.68rem] text-cream/58">0:00</span>

          <button
            id="muteBtn"
            type="button"
            class="soft-btn inline-flex h-10 w-10 items-center justify-center rounded-full border border-cream/22 bg-cream/7 text-cream/88"
            aria-label="Mute"
          >
            <svg id="iconVol" viewBox="0 0 24 24" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M5 9v6h4l5 4V5L9 9z"></path>
              <path d="M18.5 8.5a5 5 0 0 1 0 7"></path>
              <path d="M20.8 6.1a8.6 8.6 0 0 1 0 11.8"></path>
            </svg>
            <svg id="iconMuted" viewBox="0 0 24 24" class="hidden h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M5 9v6h4l5 4V5L9 9z"></path>
              <path d="M19 9l-4 6"></path>
              <path d="M15 9l4 6"></path>
            </svg>
          </button>
        </div>

        <div class="mt-4 rounded-2xl border border-cream/10 bg-black/24 p-3 md:p-4">
          <div class="mb-2 flex items-center justify-between">
            <p class="text-[0.66rem] uppercase tracking-[0.18em] text-gold/86">Tracklist</p>
            <p id="durationEl" class="tabular text-[0.66rem] text-cream/52">0:00</p>
          </div>
          <ol id="tracklistList" class="tracklist-shell space-y-1 text-[0.76rem] leading-relaxed text-cream/78"></ol>
        </div>

        <p id="mixerCreditBottom" class="mt-3 text-center text-[0.66rem] uppercase tracking-[0.16em] text-cream/42 md:mt-4">
          Mixed and curated by Andrew
        </p>
      </div>
    </section>
  </main>

  <script>
    // -------------------------------------------------------------
    // PORTAL DATA (single source of truth)
    // -------------------------------------------------------------
    // 1) Update branding + headline in PORTAL.site
    // 2) Update default looping video in PORTAL.video
    // 3) Update each mixtape's audio/artwork/download/tracklist in PORTAL.mixtapes
    const PORTAL = {
      site: {
        title: "Sunset House Mixtapes",
        mixerCredit: "Mixed by Andrew",
        headline: "Palm Deck House",
        subheadline: "A portal into the deck: palms, horizon, warm air, and three uninterrupted House journeys.",
        creditLine: "Mixed and curated by Andrew",
      },
      video: {
        src: "sunset-dance-loop.mp4",
        poster: "hero-poster.jpg",
      },
      mixtapes: [
        {
          id: "mixtape1",
          title: "Mixtape 1",
          mood: "Golden hour on the deck",
          audio: "mixtape1.mp3",
          download: "mixtape1.mp3",
          artwork: "artwork-1.png",
          video: "sunset-dance-loop.mp4",
          tracklist: [
            "01. Artist - Opening Horizon",
            "02. Artist - Palm Rhythm",
            "03. Artist - Warm Current",
            "04. Artist - Coastal Groove",
          ],
        },
        {
          id: "mixtape2",
          title: "Mixtape 2",
          mood: "Late dusk lounge energy",
          audio: "mixtape2.mp3",
          download: "mixtape2.mp3",
          artwork: "artwork-2.png",
          video: "sunset-dance-loop.mp4",
          tracklist: [
            "01. Artist - Blue Lanterns",
            "02. Artist - Deck Conversations",
            "03. Artist - Salt Air",
            "04. Artist - Night Bloom",
          ],
        },
        {
          id: "mixtape3",
          title: "Mixtape 3",
          mood: "Afterglow into night",
          audio: "mixtape3.mp3",
          download: "mixtape3.mp3",
          artwork: "artwork-3.png",
          video: "sunset-dance-loop.mp4",
          tracklist: [
            "01. Artist - Midnight Palms",
            "02. Artist - Quiet Movement",
            "03. Artist - Sea of Lights",
            "04. Artist - Closing Embrace",
          ],
        },
      ],
    };

    const audio = new Audio();
    audio.preload = "metadata";

    let activeMixIndex = 0;
    let isPlaying = false;
    let isScrubbing = false;

    const portalVideo = document.getElementById("portalVideo");
    const portalVideoSource = document.getElementById("portalVideoSource");
    const mixerCreditTop = document.getElementById("mixerCreditTop");
    const mixerCreditBottom = document.getElementById("mixerCreditBottom");
    const headline = document.getElementById("headline");
    const subheadline = document.getElementById("subheadline");
    const mixSelector = document.getElementById("mixSelector");
    const downloadRow = document.getElementById("downloadRow");
    const playerArtwork = document.getElementById("playerArtwork");
    const mixTitle = document.getElementById("mixTitle");
    const mixMood = document.getElementById("mixMood");
    const downloadCurrentBtn = document.getElementById("downloadCurrentBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const iconPlay = document.getElementById("iconPlay");
    const iconPause = document.getElementById("iconPause");
    const rewindBtn = document.getElementById("rewindBtn");
    const muteBtn = document.getElementById("muteBtn");
    const iconVol = document.getElementById("iconVol");
    const iconMuted = document.getElementById("iconMuted");
    const progressTrack = document.getElementById("progressTrack");
    const progressFill = document.getElementById("progressFill");
    const progressThumb = document.getElementById("progressThumb");
    const timeEl = document.getElementById("timeEl");
    const durationEl = document.getElementById("durationEl");
    const tracklistList = document.getElementById("tracklistList");

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const minutes = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${minutes}:${String(secs).padStart(2, "0")}`;
    }

    function setPlayState(playing) {
      isPlaying = playing;
      iconPlay.classList.toggle("hidden", playing);
      iconPause.classList.toggle("hidden", !playing);
      playPauseBtn.setAttribute("aria-label", playing ? "Pause" : "Play");
    }

    function updateMuteUI() {
      const muted = audio.muted;
      iconVol.classList.toggle("hidden", muted);
      iconMuted.classList.toggle("hidden", !muted);
      muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
    }

    function updateProgressUI() {
      const duration = audio.duration;
      const current = audio.currentTime;

      if (!Number.isFinite(duration) || duration <= 0) {
        progressFill.style.width = "0%";
        progressThumb.style.left = "0%";
        progressTrack.setAttribute("aria-valuenow", "0");
        progressTrack.setAttribute("aria-valuetext", "0:00 of 0:00");
        timeEl.textContent = "0:00";
        durationEl.textContent = "0:00";
        return;
      }

      const percent = Math.min(100, Math.max(0, (current / duration) * 100));
      progressFill.style.width = `${percent}%`;
      progressThumb.style.left = `${percent}%`;
      progressTrack.setAttribute("aria-valuenow", String(Math.round(percent)));
      progressTrack.setAttribute("aria-valuetext", `${formatTime(current)} of ${formatTime(duration)}`);
      timeEl.textContent = formatTime(current);
      durationEl.textContent = formatTime(duration);
    }

    function seekByClientX(clientX) {
      if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
      const bounds = progressTrack.getBoundingClientRect();
      const x = Math.min(Math.max(clientX - bounds.left, 0), bounds.width);
      audio.currentTime = (x / bounds.width) * audio.duration;
      updateProgressUI();
    }

    function updateMediaSession(mixtape) {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: mixtape.title,
        artist: PORTAL.site.mixerCredit,
        album: PORTAL.site.title,
        artwork: [{ src: mixtape.artwork, sizes: "512x512", type: "image/png" }],
      });
      navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
    }

    function updateVideoSource(mixtape) {
      const videoPath = mixtape.video || PORTAL.video.src;
      if (portalVideoSource.getAttribute("src") === videoPath) return;
      portalVideoSource.setAttribute("src", videoPath);
      portalVideo.load();
      if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        portalVideo.play().catch(() => {});
      }
    }

    function renderSelector() {
      mixSelector.innerHTML = "";
      PORTAL.mixtapes.forEach((mixtape, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "mix-pill soft-btn flex items-center gap-2 px-2 py-2 text-left";
        button.setAttribute("aria-label", `Play ${mixtape.title}`);
        button.dataset.index = String(index);
        button.innerHTML = `
          <span class="plaque-shell">
            <span class="plaque-core">
              <img src="${mixtape.artwork}" alt="${mixtape.title} artwork" loading="lazy" />
            </span>
          </span>
          <span class="min-w-0">
            <span class="block truncate text-[0.72rem] font-medium uppercase tracking-[0.08em] text-cream">${mixtape.title}</span>
            <span class="block truncate text-[0.65rem] text-cream/58">${mixtape.id}</span>
          </span>
        `;
        button.addEventListener("click", () => {
          if (index === activeMixIndex) {
            togglePlayPause();
          } else {
            selectMixtape(index, { autoplay: true });
          }
        });
        mixSelector.appendChild(button);
      });
    }

    function renderDownloadLinks() {
      downloadRow.innerHTML = "";
      PORTAL.mixtapes.forEach((mixtape) => {
        const link = document.createElement("a");
        link.href = mixtape.download || mixtape.audio;
        link.download = (mixtape.download || mixtape.audio).split("/").pop();
        link.className = "soft-btn inline-flex h-8 items-center justify-center rounded-full border border-cream/18 bg-cream/[0.06] px-3 text-[0.6rem] font-medium uppercase tracking-[0.12em] text-cream/76 no-underline";
        link.setAttribute("aria-label", `Download ${mixtape.title}`);
        link.textContent = `Download ${mixtape.id}`;
        downloadRow.appendChild(link);
      });
    }

    function renderActiveSelector() {
      mixSelector.querySelectorAll(".mix-pill").forEach((button, index) => {
        button.classList.toggle("active", index === activeMixIndex);
      });
    }

    function renderTracklist(tracklist) {
      tracklistList.innerHTML = "";
      tracklist.forEach((track) => {
        const item = document.createElement("li");
        item.className = "rounded-lg px-2 py-1.5 bg-cream/[0.03]";
        item.textContent = track;
        tracklistList.appendChild(item);
      });
    }

    async function playAudio() {
      try {
        await audio.play();
        setPlayState(true);
        updateMediaSession(PORTAL.mixtapes[activeMixIndex]);
      } catch (_error) {
        setPlayState(false);
      }
    }

    function togglePlayPause() {
      if (audio.paused) {
        playAudio();
      } else {
        audio.pause();
      }
    }

    function selectMixtape(index, options = {}) {
      const { autoplay = false } = options;
      const mixtape = PORTAL.mixtapes[index];
      if (!mixtape) return;

      activeMixIndex = index;
      mixTitle.textContent = mixtape.title;
      mixMood.textContent = mixtape.mood;
      playerArtwork.src = mixtape.artwork;
      playerArtwork.alt = `${mixtape.title} artwork`;
      downloadCurrentBtn.href = mixtape.download || mixtape.audio;
      downloadCurrentBtn.download = (mixtape.download || mixtape.audio).split("/").pop();

      renderTracklist(mixtape.tracklist);
      renderActiveSelector();
      updateVideoSource(mixtape);

      audio.src = mixtape.audio;
      audio.currentTime = 0;
      audio.load();
      updateProgressUI();
      updateMediaSession(mixtape);

      if (autoplay) {
        playAudio();
      } else {
        setPlayState(false);
      }
    }

    function bindEvents() {
      playPauseBtn.addEventListener("click", togglePlayPause);

      rewindBtn.addEventListener("click", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
      });

      muteBtn.addEventListener("click", () => {
        audio.muted = !audio.muted;
        updateMuteUI();
      });

      progressTrack.addEventListener("pointerdown", (event) => {
        isScrubbing = true;
        seekByClientX(event.clientX);
        progressTrack.setPointerCapture(event.pointerId);
      });

      progressTrack.addEventListener("pointermove", (event) => {
        if (!isScrubbing) return;
        seekByClientX(event.clientX);
      });

      progressTrack.addEventListener("pointerup", () => {
        isScrubbing = false;
      });

      progressTrack.addEventListener("keydown", (event) => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
        const step = Math.max(1, audio.duration * 0.02);
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          audio.currentTime = Math.max(0, audio.currentTime - step);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          audio.currentTime = Math.min(audio.duration, audio.currentTime + step);
        } else if (event.key === "Home") {
          event.preventDefault();
          audio.currentTime = 0;
        } else if (event.key === "End") {
          event.preventDefault();
          audio.currentTime = audio.duration;
        }
        updateProgressUI();
      });

      audio.addEventListener("loadedmetadata", updateProgressUI);
      audio.addEventListener("timeupdate", updateProgressUI);
      audio.addEventListener("play", () => {
        setPlayState(true);
        updateMediaSession(PORTAL.mixtapes[activeMixIndex]);
      });
      audio.addEventListener("pause", () => {
        setPlayState(false);
        updateMediaSession(PORTAL.mixtapes[activeMixIndex]);
      });
      audio.addEventListener("ended", () => setPlayState(false));

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          // Pause video in the background to reduce memory / decode load.
          portalVideo.pause();
        } else if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          portalVideo.play().catch(() => {});
        }
      });

      document.addEventListener("keydown", (event) => {
        const inEditable = event.target.closest("input, textarea, select, [contenteditable], button, a");
        if (inEditable) return;
        if (event.key === " ") {
          event.preventDefault();
          togglePlayPause();
        } else if (event.key.toLowerCase() === "m") {
          event.preventDefault();
          audio.muted = !audio.muted;
          updateMuteUI();
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          selectMixtape(Math.max(0, activeMixIndex - 1), { autoplay: true });
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          selectMixtape(Math.min(PORTAL.mixtapes.length - 1, activeMixIndex + 1), { autoplay: true });
        }
      });
    }

    function initMediaSessionActions() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.setActionHandler("play", playAudio);
      navigator.mediaSession.setActionHandler("pause", () => audio.pause());
      navigator.mediaSession.setActionHandler("seekbackward", () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        updateProgressUI();
      });
      navigator.mediaSession.setActionHandler("seekforward", () => {
        if (Number.isFinite(audio.duration)) {
          audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
          updateProgressUI();
        }
      });
      navigator.mediaSession.setActionHandler("previoustrack", () => {
        selectMixtape(Math.max(0, activeMixIndex - 1), { autoplay: true });
      });
      navigator.mediaSession.setActionHandler("nexttrack", () => {
        selectMixtape(Math.min(PORTAL.mixtapes.length - 1, activeMixIndex + 1), { autoplay: true });
      });
    }

    function applySiteContent() {
      document.title = PORTAL.site.title;
      mixerCreditTop.textContent = PORTAL.site.mixerCredit;
      mixerCreditBottom.textContent = PORTAL.site.creditLine;
      headline.textContent = PORTAL.site.headline;
      subheadline.textContent = PORTAL.site.subheadline;
      portalVideo.poster = PORTAL.video.poster;
      portalVideoSource.setAttribute("src", PORTAL.video.src);
      portalVideo.load();

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        portalVideo.pause();
      }
    }

    function init() {
      applySiteContent();
      renderSelector();
      renderDownloadLinks();
      bindEvents();
      initMediaSessionActions();
      updateMuteUI();
      selectMixtape(0, { autoplay: false });
    }

    init();
  </script>
</body>
</html>
