<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    :root {
      --bg: #000000;
      --accent: #E27A00;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --text-tertiary: #7c7c80;
      --card-border: #252528;
      --card-border-hover: #38383d;
      --plyr-color-main: var(--accent);
      color-scheme: dark;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      --page-padding: clamp(14px, 3.5vw, 34px);
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      padding: var(--page-padding);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-shell {
      width: min(1040px, 100%);
      min-height: calc(100svh - (var(--page-padding) * 2));
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: clamp(18px, 2.8vh, 30px);
      margin: 0 auto;
    }

    .player-wrapper {
      width: 100%;
      border-radius: 22px;
      overflow: hidden;
      background: #050505;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }

    #player {
      width: 100%;
      aspect-ratio: 14 / 10;
      display: block;
      background: #000000 !important;
    }

    .plyr {
      border-radius: 22px;
    }

    .plyr--video {
      background: #000000;
    }

    .plyr--full-ui input[type="range"] {
      color: var(--accent);
    }

    .plyr__control {
      transition: background-color 180ms ease, color 180ms ease, opacity 180ms ease;
    }

    .plyr__control:hover {
      background: rgba(226, 122, 0, 0.17);
    }

    .playlist-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .playlist-header {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 590;
      letter-spacing: 0.01em;
      margin: 0;
    }

    .playlist-header svg,
    .credit svg {
      flex: 0 0 auto;
    }

    .video-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 1px 1px 20px;
      scroll-snap-type: x proximity;
      scroll-padding-inline: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #2f2f33 transparent;
    }

    .video-row::-webkit-scrollbar {
      height: 6px;
    }

    .video-row::-webkit-scrollbar-track {
      background: transparent;
    }

    .video-row::-webkit-scrollbar-thumb {
      background: #2f2f33;
      border-radius: 999px;
    }

    .video-card {
      border: 1px solid var(--card-border);
      background: linear-gradient(180deg, #151518 0%, #101013 100%);
      border-radius: 14px;
      color: inherit;
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      min-width: min(64vw, 220px);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      scroll-snap-align: start;
      transition: transform 220ms ease, border-color 220ms ease, background 220ms ease, box-shadow 220ms ease;
      touch-action: pan-x;
    }

    .video-card:hover {
      border-color: var(--card-border-hover);
      transform: translateY(-1px);
      background: linear-gradient(180deg, #18181b 0%, #121215 100%);
    }

    .video-card:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 0 4px rgba(226, 122, 0, 0.2);
    }

    .video-card.active {
      border-color: var(--accent);
      background: linear-gradient(180deg, #1f1710 0%, #151312 100%);
      box-shadow: 0 0 0 1px rgba(226, 122, 0, 0.3), inset 0 0 0 1px rgba(226, 122, 0, 0.12);
    }

    .video-number {
      font-size: 0.72rem;
      color: var(--text-tertiary);
      line-height: 1.2;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }

    .video-title {
      font-size: 0.95rem;
      line-height: 1.35;
      font-weight: 510;
      color: #eeeeef;
      letter-spacing: -0.005em;
    }

    .credit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
      font-size: 0.74rem;
      letter-spacing: 0.01em;
      color: var(--text-tertiary);
      opacity: 0.72;
    }

    @media (min-width: 760px) {
      .video-card {
        min-width: 208px;
      }
    }

    @media (max-width: 560px) {
      .app-shell {
        gap: 20px;
      }

      .playlist-section {
        gap: 12px;
      }

      .video-card {
        min-width: 72vw;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="player-wrapper" aria-label="Video player">
      <video id="player" playsinline preload="metadata"></video>
    </section>

    <section class="playlist-section" aria-label="Playlist">
      <h2 class="playlist-header">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8.75" y1="6" x2="20.25" y2="6"></line>
          <line x1="8.75" y1="12" x2="20.25" y2="12"></line>
          <line x1="8.75" y1="18" x2="20.25" y2="18"></line>
          <circle cx="4.2" cy="6" r="0.8"></circle>
          <circle cx="4.2" cy="12" r="0.8"></circle>
          <circle cx="4.2" cy="18" r="0.8"></circle>
        </svg>
        Playlist
      </h2>
      <div class="video-row" id="videoRow" role="listbox" aria-label="Video playlist"></div>
    </section>

    <footer class="credit">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="5" width="14.5" height="14" rx="2.7"></rect>
        <path d="M16.5 9.5 22 6.5v11l-5.5-3"></path>
      </svg>
      <span>Filmed &amp; Edited by Andrew</span>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    const PLAYER_ID = "player";
    const PLAYLIST_ID = "videoRow";
    const TITLE_SOURCE = "titles.txt";

    const videos = [];
    let player;
    let currentId = null;
    let fallbackAttempted = false;

    async function loadTitles() {
      try {
        const response = await fetch(TITLE_SOURCE);
        if (!response.ok) {
          return [];
        }
        return (await response.text())
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    async function loadData() {
      const titles = await loadTitles();
      videos.length = 0;
      for (let i = 1; i <= titles.length; i += 1) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }
    }

    function createVideoCard(video) {
      const card = document.createElement("button");
      card.type = "button";
      card.className = "video-card";
      card.setAttribute("role", "option");
      card.setAttribute("aria-selected", String(video.id === currentId));
      card.dataset.id = String(video.id);

      if (video.id === currentId) {
        card.classList.add("active");
      }

      const number = document.createElement("div");
      number.className = "video-number";
      number.textContent = `#${video.id}`;

      const title = document.createElement("div");
      title.className = "video-title";
      title.textContent = video.title;

      card.append(number, title);
      card.addEventListener("click", () => loadVideo(video.id));
      return card;
    }

    function renderPlaylist() {
      const row = document.getElementById(PLAYLIST_ID);
      row.innerHTML = "";
      videos.forEach((video) => row.appendChild(createVideoCard(video)));
    }

    function scrollActiveCardIntoView(behavior = "smooth") {
      const row = document.getElementById(PLAYLIST_ID);
      const activeCard = row.querySelector(".video-card.active");
      if (activeCard) {
        activeCard.scrollIntoView({
          behavior,
          block: "nearest",
          inline: "center"
        });
      }
    }

    function getUppercaseSource(src) {
      return src.replace(/\.mp4$/i, ".MP4");
    }

    function initPlayer() {
      const videoElement = document.getElementById(PLAYER_ID);

      player = new Plyr(videoElement, {
        controls: ["play", "progress", "current-time", "mute", "volume", "fullscreen"],
        ratio: "14:10"
      });

      videoElement.addEventListener("error", () => {
        const currentVideo = videos.find((video) => video.id === currentId);
        if (!currentVideo || fallbackAttempted) {
          return;
        }

        fallbackAttempted = true;
        videoElement.src = getUppercaseSource(currentVideo.src);
        videoElement.play().catch(() => {});
      });

      player.on("ended", () => {
        if (!videos.length || currentId === null) {
          return;
        }
        const currentIndex = videos.findIndex((video) => video.id === currentId);
        if (currentIndex === -1) {
          return;
        }
        const nextVideo = videos[(currentIndex + 1) % videos.length];
        loadVideo(nextVideo.id);
      });
    }

    function loadVideo(id) {
      const selectedVideo = videos.find((video) => video.id === id);
      if (!selectedVideo) {
        return;
      }

      const videoElement = document.getElementById(PLAYER_ID);
      currentId = id;
      fallbackAttempted = false;
      videoElement.src = selectedVideo.src;

      renderPlaylist();
      requestAnimationFrame(() => scrollActiveCardIntoView("smooth"));
      videoElement.play().catch(() => {});
    }

    async function init() {
      await loadData();
      initPlayer();
      renderPlaylist();

      if (videos.length > 0) {
        loadVideo(videos[0].id);
        requestAnimationFrame(() => scrollActiveCardIntoView("auto"));
      }
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
