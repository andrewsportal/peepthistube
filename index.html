<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Peep This Tube - Minimal Theater Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #020305;
      --bg-1: #070a10;
      --bg-2: #0c1119;
      --text: rgba(242, 247, 255, 0.94);
      --text-soft: rgba(198, 214, 238, 0.8);
      --text-muted: rgba(166, 186, 214, 0.72);
      --line: rgba(215, 228, 248, 0.16);
      --line-soft: rgba(215, 228, 248, 0.1);
      --surface: rgba(10, 14, 22, 0.62);
      --surface-2: rgba(10, 14, 22, 0.8);
      --accent: #0a84ff;
      --focus: rgba(10, 132, 255, 0.5);

      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 22px;

      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --t: 220ms var(--ease);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      background:
        radial-gradient(1000px 560px at 50% 45%, rgba(30, 44, 66, 0.2) 0%, rgba(12, 18, 28, 0.07) 44%, transparent 70%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-0) 100%);
      isolation: isolate;
    }

    @supports (height: 100dvh) {
      .app {
        min-height: 100dvh;
      }
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.58) 0%, transparent 22%, transparent 70%, rgba(0, 0, 0, 0.66) 100%),
        radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(0, 0, 0, 0.24) 100%);
    }

    .controls-shell {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      padding:
        calc(14px + env(safe-area-inset-top, 0px))
        max(14px, env(safe-area-inset-right, 0px))
        calc(14px + env(safe-area-inset-bottom, 0px))
        max(14px, env(safe-area-inset-left, 0px));
      transition: opacity var(--t), transform var(--t);
    }

    .app.is-ui-hidden {
      cursor: none;
    }

    .app.is-ui-hidden .controls-shell,
    .app.is-ui-hidden .playlist-popover {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .top-bar,
    .bottom-bar {
      border-radius: var(--r-lg);
      border: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01)), var(--surface);
      backdrop-filter: blur(12px) saturate(110%);
      -webkit-backdrop-filter: blur(12px) saturate(110%);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 12px;
      min-height: 56px;
    }

    .title-wrap {
      min-width: 0;
    }

    .channel-label {
      margin: 0 0 2px;
      font-size: 0.69rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .title-text {
      margin: 0;
      font-size: clamp(0.9rem, 1.2vw, 1.05rem);
      font-weight: 610;
      line-height: 1.25;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(60vw, 640px);
    }

    .top-actions,
    .action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 999px;
      min-height: 44px;
      min-width: 44px;
      padding: 0 14px;
      cursor: pointer;
      transition: all var(--t);
      font-size: 0.84rem;
      font-weight: 590;
      letter-spacing: 0.01em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--line);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    .btn:focus-visible {
      outline: none;
      border-color: rgba(10, 132, 255, 0.55);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .btn-compact {
      padding: 0 12px;
      min-height: 40px;
      min-width: 40px;
      font-size: 0.8rem;
    }

    .center-controls {
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2.6vw, 30px);
      padding: 8px;
      border-radius: 999px;
    }

    .btn-circle {
      width: clamp(52px, 8vw, 64px);
      height: clamp(52px, 8vw, 64px);
      border-radius: 50%;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.92rem;
      font-weight: 620;
    }

    .btn-circle svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .btn-play {
      width: clamp(64px, 9vw, 78px);
      height: clamp(64px, 9vw, 78px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(215, 228, 248, 0.28);
    }

    .btn-play .icon-pause {
      display: none;
    }

    .btn-play.is-playing .icon-play {
      display: none;
    }

    .btn-play.is-playing .icon-pause {
      display: block;
    }

    .bottom-bar {
      padding: 10px 12px 12px;
      display: grid;
      gap: 10px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .time {
      font-size: 0.8rem;
      font-weight: 590;
      color: var(--text-soft);
      font-variant-numeric: tabular-nums;
    }

    .seek {
      width: 100%;
      margin: 0;
      height: 18px;
      background: transparent;
      appearance: none;
      cursor: pointer;
    }

    .seek:focus-visible {
      outline: none;
    }

    .seek::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.26);
    }

    .seek::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -6px;
      border-radius: 50%;
      border: 0;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.16);
    }

    .seek::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.26);
    }

    .seek::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 0;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.16);
    }

    .playlist-popover {
      position: absolute;
      z-index: 9;
      top: calc(72px + env(safe-area-inset-top, 0px));
      right: max(14px, env(safe-area-inset-right, 0px));
      width: min(360px, calc(100% - 28px));
      max-height: min(56vh, 420px);
      overflow: auto;
      padding: 8px;
      border-radius: var(--r-lg);
      border: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01)), var(--surface-2);
      backdrop-filter: blur(14px) saturate(112%);
      -webkit-backdrop-filter: blur(14px) saturate(112%);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.44);
      transition: opacity var(--t), transform var(--t);
    }

    .playlist-popover[hidden] {
      display: none !important;
    }

    .playlist-option {
      width: 100%;
      appearance: none;
      border: 1px solid transparent;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 10px 11px;
      min-height: 44px;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      transition: all var(--t);
    }

    .playlist-option + .playlist-option {
      margin-top: 6px;
    }

    .playlist-option-id {
      font-size: 0.66rem;
      color: var(--text-muted);
      letter-spacing: 0.065em;
      text-transform: uppercase;
      font-weight: 610;
      font-variant-numeric: tabular-nums;
    }

    .playlist-option-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .playlist-option:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--line);
      transform: translateY(-1px);
    }

    .playlist-option:focus-visible {
      outline: none;
      border-color: rgba(10, 132, 255, 0.56);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .playlist-option.is-active {
      background: rgba(10, 132, 255, 0.2);
      border-color: rgba(121, 185, 255, 0.5);
    }

    .osd {
      position: absolute;
      left: 50%;
      top: calc(50% + 84px);
      transform: translate(-50%, 10px);
      z-index: 12;
      pointer-events: none;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.62);
      color: var(--text);
      font-size: 0.79rem;
      letter-spacing: 0.04em;
      font-weight: 610;
      opacity: 0;
      transition: all var(--t);
      white-space: nowrap;
    }

    .osd.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      border: 0;
      padding: 0;
      white-space: nowrap;
      clip-path: inset(50%);
      clip: rect(0 0 0 0);
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .center-controls {
        gap: 14px;
      }

      .title-text {
        max-width: 48vw;
      }
    }

    @media (max-width: 720px) {
      .controls-shell {
        gap: 12px;
        padding:
          calc(10px + env(safe-area-inset-top, 0px))
          max(10px, env(safe-area-inset-right, 0px))
          calc(10px + env(safe-area-inset-bottom, 0px))
          max(10px, env(safe-area-inset-left, 0px));
      }

      .top-bar,
      .bottom-bar {
        border-radius: var(--r-md);
      }

      .top-bar {
        min-height: 52px;
        padding: 8px 10px;
      }

      .title-text {
        max-width: 56vw;
        font-size: 0.88rem;
      }

      .channel-label {
        font-size: 0.64rem;
      }

      .btn-compact {
        min-height: 38px;
        min-width: 38px;
        padding: 0 10px;
      }

      .btn-circle {
        width: 52px;
        height: 52px;
      }

      .btn-play {
        width: 62px;
        height: 62px;
      }

      .playlist-popover {
        top: calc(62px + env(safe-area-inset-top, 0px));
        max-height: 52vh;
      }
    }

    @media (pointer: coarse) {
      .btn {
        min-height: 48px;
        min-width: 48px;
      }

      .btn-compact {
        min-height: 44px;
        min-width: 44px;
      }

      .playlist-option {
        min-height: 48px;
      }

      .top-bar,
      .bottom-bar {
        backdrop-filter: blur(8px) saturate(106%);
        -webkit-backdrop-filter: blur(8px) saturate(106%);
      }

      .playlist-popover {
        backdrop-filter: blur(10px) saturate(106%);
        -webkit-backdrop-filter: blur(10px) saturate(106%);
      }
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .top-bar,
      .bottom-bar {
        background: rgba(10, 14, 22, 0.9);
      }

      .playlist-popover {
        background: rgba(10, 14, 22, 0.95);
      }
    }

    @media (prefers-contrast: more) {
      .btn,
      .playlist-option,
      .top-bar,
      .bottom-bar,
      .playlist-popover {
        border-color: rgba(224, 236, 255, 0.42);
      }

      .channel-label,
      .time,
      .playlist-option-id {
        color: #dce9ff;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app" aria-label="Minimal theater video player">
    <video id="player" preload="metadata" playsinline></video>
    <div class="vignette" aria-hidden="true"></div>

    <div class="controls-shell" id="controlsShell">
      <header class="top-bar">
        <div class="title-wrap">
          <p class="channel-label" id="channelLabel">Channel --</p>
          <h1 class="title-text" id="nowPlayingTitle">Loading playlist...</h1>
        </div>
        <div class="top-actions">
          <button class="btn btn-compact" id="playlistToggle" type="button" aria-haspopup="listbox" aria-controls="playlistMenu" aria-expanded="false">
            Playlist
          </button>
          <button class="btn btn-compact" id="fullscreenBtn" type="button" aria-label="Toggle full screen">
            Full
          </button>
        </div>
      </header>

      <section class="center-controls" aria-label="Playback controls">
        <button class="btn btn-circle" id="rewindBtn" type="button" aria-label="Rewind 10 seconds">-10</button>

        <button class="btn btn-circle btn-play" id="playBtn" type="button" aria-label="Play video">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="8,5 20,12 8,19"></polygon>
          </svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="6" y="5" width="4.5" height="14"></rect>
            <rect x="13.5" y="5" width="4.5" height="14"></rect>
          </svg>
        </button>

        <button class="btn btn-circle" id="forwardBtn" type="button" aria-label="Forward 10 seconds">+10</button>
      </section>

      <footer class="bottom-bar">
        <div class="timeline-row">
          <span class="time" id="timeCurrent">0:00</span>
          <input class="seek" id="seekBar" type="range" min="0" max="1000" step="1" value="0" aria-label="Seek video timeline" />
          <span class="time" id="timeTotal">--:--</span>
        </div>
        <div class="action-row">
          <button class="btn btn-compact" id="prevBtn" type="button" aria-label="Previous channel">Prev</button>
          <button class="btn btn-compact" id="nextBtn" type="button" aria-label="Next channel">Next</button>
          <button class="btn btn-compact" id="muteBtn" type="button" aria-label="Mute audio">Mute</button>
        </div>
      </footer>
    </div>

    <section class="playlist-popover" id="playlistMenu" role="listbox" aria-label="Video playlist" hidden></section>
    <div class="osd" id="osd" aria-live="polite"></div>
    <span class="sr-only" id="liveRegion" aria-live="polite"></span>
  </main>

  <script>
    const TITLE_SOURCE = "titles.txt";
    const PLAYER_ID = "player";

    const videos = [];
    let currentId = null;
    let fallbackAttempted = false;
    let channelMenuVisible = false;
    let osdTimer = null;
    let hideUiTimer = null;
    let isScrubbing = false;

    const app = document.getElementById("app");
    const player = document.getElementById(PLAYER_ID);
    const controlsShell = document.getElementById("controlsShell");
    const playlistToggle = document.getElementById("playlistToggle");
    const playlistMenu = document.getElementById("playlistMenu");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    const channelLabel = document.getElementById("channelLabel");
    const nowPlayingTitle = document.getElementById("nowPlayingTitle");

    const playBtn = document.getElementById("playBtn");
    const rewindBtn = document.getElementById("rewindBtn");
    const forwardBtn = document.getElementById("forwardBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const muteBtn = document.getElementById("muteBtn");

    const seekBar = document.getElementById("seekBar");
    const timeCurrent = document.getElementById("timeCurrent");
    const timeTotal = document.getElementById("timeTotal");

    const osd = document.getElementById("osd");
    const liveRegion = document.getElementById("liveRegion");

    async function loadTitles() {
      try {
        const response = await fetch(TITLE_SOURCE);
        if (!response.ok) return [];
        return (await response.text())
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    async function loadData() {
      const titles = await loadTitles();
      videos.length = 0;

      for (let i = 1; i <= titles.length; i += 1) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }

      if (!videos.length) {
        videos.push({ id: 1, title: "Video 1", src: "video1.mp4" });
      }
    }

    function getUppercaseSource(src) {
      return src.replace(/\.mp4$/i, ".MP4");
    }

    function padChannel(id) {
      return String(id).padStart(2, "0");
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "--:--";
      const total = Math.floor(seconds);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showOSD(message, duration = 1400) {
      osd.textContent = message;
      liveRegion.textContent = message;
      osd.classList.add("is-visible");
      clearTimeout(osdTimer);
      osdTimer = setTimeout(() => {
        osd.classList.remove("is-visible");
      }, duration);
    }

    function setPlayButtonState(isPlaying) {
      playBtn.classList.toggle("is-playing", isPlaying);
      playBtn.setAttribute("aria-label", isPlaying ? "Pause video" : "Play video");
    }

    function updateMuteButton() {
      const muted = player.muted;
      muteBtn.textContent = muted ? "Unmute" : "Mute";
      muteBtn.setAttribute("aria-label", muted ? "Unmute audio" : "Mute audio");
      muteBtn.classList.toggle("is-active", muted);
    }

    function updateNowPlaying(video) {
      channelLabel.textContent = `Channel ${padChannel(video.id)}`;
      nowPlayingTitle.textContent = video.title;
    }

    function updateTimeline() {
      const duration = Number.isFinite(player.duration) ? player.duration : 0;
      const current = Number.isFinite(player.currentTime) ? player.currentTime : 0;
      timeCurrent.textContent = formatTime(current);
      timeTotal.textContent = duration > 0 ? formatTime(duration) : "--:--";
      if (!isScrubbing) {
        seekBar.value = duration > 0 ? String(Math.round((current / duration) * 1000)) : "0";
      }
    }

    function getCurrentIndex() {
      return videos.findIndex((video) => video.id === currentId);
    }

    function getPlaylistOptions() {
      return Array.from(playlistMenu.querySelectorAll(".playlist-option"));
    }

    function focusPlaylistOption(index) {
      const options = getPlaylistOptions();
      if (!options.length) return;
      const safeIndex = ((index % options.length) + options.length) % options.length;
      options.forEach((option, i) => {
        option.tabIndex = i === safeIndex ? 0 : -1;
      });
      options[safeIndex].focus();
    }

    function renderPlaylist() {
      playlistMenu.innerHTML = "";
      videos.forEach((video) => {
        const option = document.createElement("button");
        option.type = "button";
        option.id = `playlist-option-${video.id}`;
        option.className = "playlist-option";
        option.setAttribute("role", "option");
        option.setAttribute("aria-selected", String(video.id === currentId));
        option.tabIndex = -1;

        if (video.id === currentId) option.classList.add("is-active");

        const id = document.createElement("span");
        id.className = "playlist-option-id";
        id.textContent = `CH ${padChannel(video.id)}`;

        const title = document.createElement("span");
        title.className = "playlist-option-title";
        title.textContent = video.title;

        option.append(id, title);

        option.addEventListener("click", () => {
          loadVideo(video.id);
          setPlaylistVisible(false, { returnFocus: true });
        });

        playlistMenu.appendChild(option);
      });
    }

    function setPlaylistVisible(visible, { focus = false, returnFocus = false } = {}) {
      channelMenuVisible = visible;
      playlistMenu.hidden = !visible;
      playlistToggle.setAttribute("aria-expanded", String(visible));

      if (visible) {
        renderPlaylist();
        showUi(true);
        if (focus) {
          const currentIndex = videos.findIndex((video) => video.id === currentId);
          focusPlaylistOption(currentIndex >= 0 ? currentIndex : 0);
        }
      } else {
        if (returnFocus) playlistToggle.focus();
        hideUiAfterDelay();
      }
    }

    async function safePlay(showHint = true) {
      try {
        await player.play();
        return true;
      } catch (error) {
        if (showHint) showOSD("TAP PLAY");
        return false;
      }
    }

    async function loadVideo(id) {
      const selected = videos.find((video) => video.id === id);
      if (!selected) return;

      currentId = id;
      fallbackAttempted = false;
      player.src = selected.src;

      updateNowPlaying(selected);
      renderPlaylist();
      showOSD(`CH ${padChannel(selected.id)} • ${selected.title.toUpperCase()}`, 1500);

      await safePlay(true);
    }

    function stepChannel(step) {
      if (!videos.length) return;
      const currentIndex = getCurrentIndex();
      const safe = currentIndex >= 0 ? currentIndex : 0;
      const next = (safe + step + videos.length) % videos.length;
      loadVideo(videos[next].id);
    }

    function showUi(lock = false) {
      app.classList.remove("is-ui-hidden");
      clearTimeout(hideUiTimer);
      if (!lock) hideUiAfterDelay();
    }

    function hideUiAfterDelay() {
      clearTimeout(hideUiTimer);
      if (player.paused || channelMenuVisible || isScrubbing) return;
      hideUiTimer = setTimeout(() => {
        app.classList.add("is-ui-hidden");
      }, 2200);
    }

    function handlePlaylistKeyboard(event) {
      if (!channelMenuVisible) return false;
      const options = getPlaylistOptions();
      if (!options.length) return false;

      const currentIndex = Math.max(0, options.findIndex((option) => option === document.activeElement));

      if (event.key === "ArrowDown") {
        event.preventDefault();
        focusPlaylistOption(currentIndex + 1);
        return true;
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        focusPlaylistOption(currentIndex - 1);
        return true;
      }

      if (event.key === "Home") {
        event.preventDefault();
        focusPlaylistOption(0);
        return true;
      }

      if (event.key === "End") {
        event.preventDefault();
        focusPlaylistOption(options.length - 1);
        return true;
      }

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        const active = currentIndex >= 0 ? options[currentIndex] : options[0];
        active.click();
        return true;
      }

      if (event.key === "Escape") {
        event.preventDefault();
        setPlaylistVisible(false, { returnFocus: true });
        return true;
      }

      return false;
    }

    function isEditingTarget(target) {
      if (!(target instanceof HTMLElement)) return false;
      return /input|textarea|select|button/i.test(target.tagName);
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    async function requestFullscreen() {
      const root = document.documentElement;
      const fn = root.requestFullscreen || root.webkitRequestFullscreen;
      if (!fn) return false;
      try {
        const result = fn.call(root);
        if (result && typeof result.then === "function") await result;
        return true;
      } catch (error) {
        return false;
      }
    }

    async function exitFullscreen() {
      const fn = document.exitFullscreen || document.webkitExitFullscreen;
      if (!fn) return false;
      try {
        const result = fn.call(document);
        if (result && typeof result.then === "function") await result;
        return true;
      } catch (error) {
        return false;
      }
    }

    function updateFullscreenButton() {
      fullscreenBtn.textContent = getFullscreenElement() ? "Exit" : "Full";
    }

    async function toggleFullscreen() {
      if (getFullscreenElement()) {
        await exitFullscreen();
      } else {
        const ok = await requestFullscreen();
        if (!ok && typeof player.webkitEnterFullscreen === "function") {
          try {
            player.webkitEnterFullscreen();
          } catch (error) {
            /* no-op */
          }
        }
      }
      updateFullscreenButton();
    }

    function armFullscreenOnGesture() {
      const once = async () => {
        await requestFullscreen();
        updateFullscreenButton();
      };
      window.addEventListener("pointerdown", once, { once: true });
      window.addEventListener("keydown", once, { once: true });
    }

    function bindEvents() {
      playBtn.addEventListener("click", async () => {
        showUi(true);
        if (player.paused) {
          const ok = await safePlay(true);
          if (ok) showOSD("PLAY", 700);
        } else {
          player.pause();
          showOSD("PAUSE", 700);
        }
      });

      rewindBtn.addEventListener("click", () => {
        showUi(true);
        player.currentTime = Math.max(0, (player.currentTime || 0) - 10);
        showOSD("REWIND 10s", 900);
      });

      forwardBtn.addEventListener("click", () => {
        showUi(true);
        const duration = Number.isFinite(player.duration) ? player.duration : player.currentTime + 10;
        player.currentTime = Math.min(duration, (player.currentTime || 0) + 10);
        showOSD("FORWARD 10s", 900);
      });

      prevBtn.addEventListener("click", () => {
        showUi(true);
        stepChannel(-1);
      });

      nextBtn.addEventListener("click", () => {
        showUi(true);
        stepChannel(1);
      });

      muteBtn.addEventListener("click", () => {
        showUi(true);
        player.muted = !player.muted;
        updateMuteButton();
        showOSD(player.muted ? "MUTE" : "UNMUTE", 800);
      });

      playlistToggle.addEventListener("click", () => {
        setPlaylistVisible(!channelMenuVisible, { focus: !channelMenuVisible });
      });

      fullscreenBtn.addEventListener("click", async () => {
        showUi(true);
        await toggleFullscreen();
      });

      seekBar.addEventListener("pointerdown", () => {
        isScrubbing = true;
        showUi(true);
      });

      document.addEventListener("pointerup", () => {
        if (!isScrubbing) return;
        isScrubbing = false;
        hideUiAfterDelay();
      });

      seekBar.addEventListener("input", () => {
        const duration = Number.isFinite(player.duration) ? player.duration : 0;
        if (duration > 0) {
          player.currentTime = (Number(seekBar.value) / 1000) * duration;
          updateTimeline();
        }
        showUi(true);
      });

      document.addEventListener("pointerdown", (event) => {
        if (!channelMenuVisible) return;
        if (!(event.target instanceof Node)) return;
        if (playlistMenu.contains(event.target) || playlistToggle.contains(event.target)) return;
        setPlaylistVisible(false);
      });

      app.addEventListener("pointermove", () => showUi());
      app.addEventListener("pointerdown", () => showUi());

      controlsShell.addEventListener("pointerenter", () => showUi(true));
      controlsShell.addEventListener("pointerleave", () => hideUiAfterDelay());

      player.addEventListener("play", () => {
        setPlayButtonState(true);
        hideUiAfterDelay();
      });

      player.addEventListener("pause", () => {
        setPlayButtonState(false);
        showUi(true);
      });

      player.addEventListener("timeupdate", updateTimeline);
      player.addEventListener("durationchange", updateTimeline);
      player.addEventListener("loadedmetadata", updateTimeline);

      player.addEventListener("volumechange", updateMuteButton);

      player.addEventListener("error", async () => {
        const currentVideo = videos.find((video) => video.id === currentId);
        if (!currentVideo || fallbackAttempted) return;
        fallbackAttempted = true;
        player.src = getUppercaseSource(currentVideo.src);
        await safePlay(false);
      });

      player.addEventListener("ended", () => {
        stepChannel(1);
      });

      document.addEventListener("keydown", async (event) => {
        showUi();

        if (handlePlaylistKeyboard(event)) return;

        if (isEditingTarget(event.target) && event.target !== playBtn) return;

        if (event.key === "Escape" && channelMenuVisible) {
          event.preventDefault();
          setPlaylistVisible(false, { returnFocus: true });
          return;
        }

        if (event.key === "ArrowRight") {
          event.preventDefault();
          forwardBtn.click();
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          rewindBtn.click();
        } else if (event.key === " " || event.key.toLowerCase() === "k") {
          event.preventDefault();
          playBtn.click();
        } else if (event.key.toLowerCase() === "m") {
          event.preventDefault();
          muteBtn.click();
        } else if (event.key.toLowerCase() === "n") {
          event.preventDefault();
          nextBtn.click();
        } else if (event.key.toLowerCase() === "p") {
          event.preventDefault();
          prevBtn.click();
        } else if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          await toggleFullscreen();
        } else if (event.key.toLowerCase() === "c") {
          event.preventDefault();
          setPlaylistVisible(!channelMenuVisible, { focus: !channelMenuVisible });
        }
      });

      document.addEventListener("fullscreenchange", updateFullscreenButton);
      document.addEventListener("webkitfullscreenchange", updateFullscreenButton);

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          clearTimeout(hideUiTimer);
        } else {
          showUi();
        }
      });
    }

    async function init() {
      await loadData();
      bindEvents();
      renderPlaylist();
      updateMuteButton();
      setPlayButtonState(false);
      updateFullscreenButton();

      if (videos.length) {
        await loadVideo(videos[0].id);
      } else {
        showOSD("NO MEDIA");
      }

      const full = await requestFullscreen();
      if (!full) armFullscreenOnGesture();
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
