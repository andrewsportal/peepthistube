<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <style>
    :root {
      --bg: #000000;
      --accent: #E27A00;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px 16px 40px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .player-wrapper {
      background: #000000;
      padding-bottom: 20px;
    }
    .player-container {
      background: #000000;
      overflow: hidden;
    }
    #player {
      background: #000000 !important;
    }
    .playlist-section {
      margin-top: 8px;
    }
    .playlist-section h3 {
      font-size: 0.95rem;
      margin: 0 0 12px;
      font-weight: 600;
    }
    .video-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .video-card {
      min-width: 160px;
      background: #1c1c1e;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      border: 1px solid #2c2c2e;
    }
    .video-card.active {
      border-color: var(--accent);
    }
    .video-number {
      font-size: 0.7rem;
      color: #8e8e93;
    }
    .video-title {
      font-size: 0.95rem;
      font-weight: 500;
      margin-top: 4px;
    }
    .credit {
      text-align: center;
      margin-top: 32px;
      font-size: 0.75rem;
      color: #666;
      opacity: 0.6;
    }
    :root {
      --plyr-color-main: #E27A00;
    }
  </style>
</head>
<body>
  <!-- Video Player -->
  <div class="player-wrapper">
    <div class="player-container">
      <video id="player" playsinline></video>
    </div>
  </div>

  <!-- Playlist -->
  <div class="playlist-section">
    <h3>Playlist</h3>
    <div class="video-row" id="videoRow"></div>
  </div>

  <!-- Credit -->
  <div class="credit">
    Filmed & Edited by Andrew
  </div>

  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
  <script>
    let videos = [];
    let player;
    let currentId = null;

    async function loadData() {
      let titles = [];
      try {
        const res = await fetch('titles.txt');
        if (res.ok) titles = (await res.text()).split('\n').map(l => l.trim()).filter(Boolean);
      } catch (e) {}

      const count = titles.length;
      for (let i = 1; i <= count; i++) {
        videos.push({
          id: i,
          title: titles[i - 1] || `Video ${i}`,
          src: `video${i}.mp4`
        });
      }
    }

    function initPlayer() {
      const videoEl = document.getElementById('player');
      player = new Plyr(videoEl, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
      });

      videoEl.addEventListener('error', () => {
        const currentSrc = videoEl.src;
        if (currentSrc.endsWith('.mp4') && !currentSrc.endsWith('.MP4')) {
          videoEl.src = currentSrc.replace('.mp4', '.MP4');
          videoEl.play().catch(() => {});
        }
      });

      player.on('ended', () => {
        const idx = videos.findIndex(v => v.id === currentId);
        if (idx !== -1) loadVideo(videos[(idx + 1) % videos.length].id);
      });
    }

    function renderPlaylist() {
      const row = document.getElementById('videoRow');
      row.innerHTML = '';
      videos.forEach(v => {
        const card = document.createElement('div');
        card.className = `video-card ${v.id === currentId ? 'active' : ''}`;
        card.innerHTML = `
          <div class="video-number">#${v.id}</div>
          <div class="video-title">${v.title}</div>
        `;
        card.onclick = () => loadVideo(v.id);
        row.appendChild(card);
      });
    }

    function loadVideo(id) {
      const video = videos.find(v => v.id === id);
      if (!video) return;

      const videoEl = document.getElementById('player');
      currentId = id;

      videoEl.src = video.src;
      renderPlaylist();
      videoEl.play().catch(() => {});
    }

    async function init() {
      await loadData();
      initPlayer();
      renderPlaylist();

      if (videos.length > 0) {
        loadVideo(videos[0].id);
      }
    }

    window.onload = init;
  </script>
</body>
</html>
